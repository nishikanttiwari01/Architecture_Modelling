name: Validate handbook

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install diagram dependencies
        shell: pwsh
        run: python -m pip install -r requirements-diagrams.txt

      - name: Compile scripts
        shell: pwsh
        run: python -m compileall -q scripts

      - name: Test Horizon Bank catalogue validation
        shell: pwsh
        run: python -m unittest scripts.test_validate_horizon_bank

      - name: Validate Horizon Bank catalogues
        shell: pwsh
        run: python scripts/validate_horizon_bank.py

      - name: Check repository structure
        shell: pwsh
        run: python scripts/check-structure.py

      - name: Check links
        shell: pwsh
        run: python scripts/check-links.py

      - name: Check terminology
        shell: pwsh
        run: python scripts/check-terminology.py

      - name: Validate diagram conventions
        shell: pwsh
        run: python scripts/validate-diagrams.py

      - name: Check diagram register
        shell: pwsh
        run: python scripts/check-diagram-register.py

      - name: Build combined manuscript
        shell: pwsh
        run: python scripts/build-book.py

      - name: Report word counts
        shell: pwsh
        run: python scripts/word-count.py

      - name: Render all diagrams
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File ./scripts/render-all-diagrams.ps1

      - name: Check exports match sources
        shell: pwsh
        run: git diff --exit-code -- diagrams/exported/svg diagrams/exported/png
