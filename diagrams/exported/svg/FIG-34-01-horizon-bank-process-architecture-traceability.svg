<?xml version="1.0" encoding="us-ascii" standalone="no"?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="861px" preserveAspectRatio="none" style="width:711px;height:861px;background:#FFFFFF;" version="1.1" viewBox="0 0 711 861" width="711px" zoomAndPan="magnify"><defs/><g><text fill="#000000" font-family="Arial" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="464" x="116.75" y="23.1318">Horizon Bank process-architecture decomposition and traceability</text><!--entity FAMILY--><g id="elem_FAMILY"><rect fill="#E0F2FE" height="61.3965" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="205" x="179.5" y="44.0986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="112" x="189.5" y="65.3545">CATALOGUE LEVEL</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="185" x="189.5" y="79.1533">Customer and party management</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="81" x="189.5" y="92.9521">Process family</text></g><!--entity PROCESS--><g id="elem_PROCESS"><rect fill="#DBEAFE" height="61.3965" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="195" x="293.5" y="125.0986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="116" x="303.5" y="146.3545">END-TO-END LEVEL</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="175" x="303.5" y="160.1533">Establish customer relationship</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="46" x="303.5" y="173.9521">Process</text></g><!--entity DECOMP--><g id="elem_DECOMP"><rect fill="#F8FAFC" height="102.793" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="214" x="7" y="206.0986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="191" x="17" y="227.3545">SELECTED SUBPROCESS LEVEL</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="120" x="17" y="241.1533">1  Capture application</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="148" x="17" y="254.9521">2  Verify identity and screen</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="188" x="17" y="268.751">3  Resolve referral [exception path]</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="194" x="17" y="282.5498">4  Create party and account records</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="140" x="17" y="296.3486">5  Confirm usable service</text></g><!--entity OWNER--><g id="elem_OWNER"><rect fill="#F3E8FF" height="47.5977" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="170" x="415" y="50.5986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="101" x="425" y="71.8545">ACCOUNTABILITY</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="150" x="425" y="85.6533">Onboarding process owner</text></g><!--entity OUTCOME--><g id="elem_OUTCOME"><rect fill="#DCFCE7" height="47.5977" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="175" x="107.5" y="329.0986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="60" x="117.5" y="350.3545">OUTCOME</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="155" x="117.5" y="364.1533">Usable banking relationship</text></g><!--entity CONTROLS--><g id="elem_CONTROLS"><rect fill="#FEE2E2" height="47.5977" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="227" x="117.5" y="397.0986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="67" x="127.5" y="418.3545">CONTROLS</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="207" x="127.5" y="432.1533">Identity evidence | Screening evidence</text></g><!--entity MEASURES--><g id="elem_MEASURES"><rect fill="#FEF3C7" height="61.3965" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="255" x="151.5" y="465.0986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="66" x="161.5" y="486.3545">MEASURES</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="235" x="161.5" y="500.1533">Elapsed time | Straight-through processing</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="161" x="161.5" y="513.9521">Referral rate | Control failures</text></g><!--entity CAPS--><g id="elem_CAPS"><rect fill="#E0E7FF" height="75.1953" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="253" x="215.5" y="546.0986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="150" x="225.5" y="567.3545">CAPABILITIES EXERCISED</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="233" x="225.5" y="581.1533">Customer Onboarding | Identity Verification</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="146" x="225.5" y="594.9521">Financial Crime Screening</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="204" x="225.5" y="608.751">Party Management | Account Opening</text></g><!--entity BIAN--><g id="elem_BIAN"><rect fill="#F1F5F9" height="75.1953" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="295" x="235.5" y="641.0986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="187" x="245.5" y="662.3545">REFERENCE RESPONSIBILITIES</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="275" x="245.5" y="676.1533">Candidate BIAN Service Domains and interactions</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="148" x="245.5" y="689.9521">BIAN 14.0 logical reference</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="202" x="245.5" y="703.751">Candidate, partial and many-to-many</text></g><!--entity BPMN--><g id="elem_BPMN"><rect fill="#ECFDF5" height="61.3965" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="323" x="318.5" y="736.0986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="108" x="328.5" y="757.3545">SELECTED DETAIL</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="303" x="328.5" y="771.1533">BPMN collaboration for behaviour and referral exception</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="176" x="328.5" y="784.9521">Not a full-bank process diagram</text></g><g id="elem_GMN27"><path d="M255.5,817.0986 L255.5,854.6963 A0,0 0 0 0 255.5,854.6963 L704.5,854.6963 A0,0 0 0 0 704.5,854.6963 L704.5,827.0986 L694.5,817.0986 L484,817.0986 L480,797.2886 L476,817.0986 L255.5,817.0986 A0,0 0 0 0 255.5,817.0986 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M694.5,817.0986 L694.5,827.0986 L704.5,827.0986 L694.5,817.0986 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="235" x="261.5" y="833.3545">Selected Horizon Bank onboarding excerpt.</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="428" x="261.5" y="847.1533">Process, capability, BIAN responsibility and implementation are not equivalent.</text></g><!--link FAMILY to PROCESS--><g id="link_FAMILY_PROCESS"><path d="M339,105.