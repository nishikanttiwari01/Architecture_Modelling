<?xml version="1.0" encoding="us-ascii" standalone="no"?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="789px" preserveAspectRatio="none" style="width:617px;height:789px;background:#FFFFFF;" version="1.1" viewBox="0 0 617 789" width="617px" zoomAndPan="magnify"><defs/><g><text fill="#000000" font-family="Arial" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="464" x="69.5" y="23.1318">Horizon Bank process-architecture decomposition and traceability</text><!--entity FAMILY--><g id="elem_FAMILY"><rect fill="#E0F2FE" height="61.3965" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="205" x="222.5" y="44.0986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="112" x="232.5" y="65.3545">CATALOGUE LEVEL</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="185" x="232.5" y="79.1533">Customer and party management</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="81" x="232.5" y="92.9521">Process family</text></g><!--entity PROCESS--><g id="elem_PROCESS"><rect fill="#DBEAFE" height="61.3965" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="195" x="227.5" y="117.0986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="116" x="237.5" y="138.3545">END-TO-END LEVEL</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="175" x="237.5" y="152.1533">Establish customer relationship</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="46" x="237.5" y="165.9521">Process</text></g><!--entity DECOMP--><g id="elem_DECOMP"><rect fill="#F8FAFC" height="102.793" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="214" x="7" y="190.0986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="191" x="17" y="211.3545">SELECTED SUBPROCESS LEVEL</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="120" x="17" y="225.1533">1  Capture application</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="148" x="17" y="238.9521">2  Verify identity and screen</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="188" x="17" y="252.751">3  Resolve referral [exception path]</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="194" x="17" y="266.5498">4  Create party and account records</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="140" x="17" y="280.3486">5  Confirm usable service</text></g><!--entity OWNER--><g id="elem_OWNER"><rect fill="#F3E8FF" height="47.5977" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="170" x="441" y="123.5986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="101" x="451" y="144.8545">ACCOUNTABILITY</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="150" x="451" y="158.6533">Onboarding process owner</text></g><!--entity OUTCOME--><g id="elem_OUTCOME"><rect fill="#DCFCE7" height="47.5977" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="175" x="83.5" y="305.0986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="60" x="93.5" y="326.3545">OUTCOME</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="155" x="93.5" y="340.1533">Usable banking relationship</text></g><!--entity CONTROLS--><g id="elem_CONTROLS"><rect fill="#FEE2E2" height="47.5977" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="227" x="69.5" y="365.0986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="67" x="79.5" y="386.3545">CONTROLS</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="207" x="79.5" y="400.1533">Identity evidence | Screening evidence</text></g><!--entity MEASURES--><g id="elem_MEASURES"><rect fill="#FEF3C7" height="61.3965" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="255" x="79.5" y="425.0986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="66" x="89.5" y="446.3545">MEASURES</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="235" x="89.5" y="460.1533">Elapsed time | Straight-through processing</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="161" x="89.5" y="473.9521">Referral rate | Control failures</text></g><!--entity CAPS--><g id="elem_CAPS"><rect fill="#E0E7FF" height="75.1953" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="253" x="119.5" y="498.0986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="150" x="129.5" y="519.3545">CAPABILITIES EXERCISED</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="233" x="129.5" y="533.1533">Customer Onboarding | Identity Verification</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="146" x="129.5" y="546.9521">Financial Crime Screening</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="204" x="129.5" y="560.751">Party Management | Account Opening</text></g><!--entity BIAN--><g id="elem_BIAN"><rect fill="#F1F5F9" height="75.1953" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="295" x="115.5" y="585.0986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="187" x="125.5" y="606.3545">REFERENCE RESPONSIBILITIES</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="275" x="125.5" y="620.1533">Candidate BIAN Service Domains and interactions</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="148" x="125.5" y="633.9521">BIAN 14.0 logical reference</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="202" x="125.5" y="647.751">Candidate, partial and many-to-many</text></g><!--entity BPMN--><g id="elem_BPMN"><rect fill="#ECFDF5" height="61.3965" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="323" x="189.5" y="672.0986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="108" x="199.5" y="693.3545">SELECTED DETAIL</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="303" x="199.5" y="707.1533">BPMN collaboration for behaviour and referral exception</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="176" x="199.5" y="720.9521">Not a full-bank process diagram</text></g><g id="elem_GMN28"><path d="M126.5,745.0986 L126.5,782.6963 A0,0 0 0 0 126.5,782.6963 L575.5,782.6963 A0,0 0 0 0 575.5,782.6963 L575.5,755.0986 L565.5,745.0986 L355,745.0986 L351,733.3486 L347,745.0986 L126.5,745.0986 A0,0 0 0 0 126.5,745.0986 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M565.5,745.0986 L565.5,755.0986 L575.5,755.0986 L565.5,745.0986 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="235" x="132.5" y="761.3545">Selected Horizon Bank onboarding excerpt.</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="428" x="132.5" y="775.1533">Process, capability, BIAN responsibility and implementation are not equivalent.</text></g><!--link FAMILY to PROCESS--><g id="link_FAMILY_PROCESS"><path d="M325,105.1386 C325,109.0386 325,107.0386 325,110.9486 " fill="none" id="FAMILY-to-PROCESS" style="stroke:#334155;stroke-width:1.0;"/><polygon fill="#334155" points="325,116.9486,329,107.9486,325,111.9486,321,107.9486,325,116.9486" style="stroke:#334155;stroke-width:1.0;"/><text fill="#1E293B" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="41" x="283" y="108.3565">contains</text></g><!--reverse link PROCESS to OWNER--><g id="link_PROCESS_OWNER"><path d="M428.56,148.0986 C434.66,148.0986 434.77,148.0986 440.81,148.0986 " fill="none" id="PROCESS-backto-OWNER" style="stroke:#334155;stroke-width:1.0;"/><polygon fill="#334155" points="422.56,148.0986,431.56,152.0986,427.56,148.0986,431.56,144.0986,422.56,148.0986" style="stroke:#334155;stroke-width:1.0;"/><text fill="#1E293B" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="87" x="388.18" y="159.4165">is accountable for</text></g><!--link PROCESS to DECOMP--><g id="link_PROCESS_DECOMP"><path d="M237.83,178.2786 C237.83,205.8686 237.83,242.0986 237.83,242.0986 C237.83,242.0986 237.26,242.0986 227.13,242.0986 " fill="none" id="PROCESS-to-DECOMP" style="stroke:#334155;stroke-width:1.0;"/><polygon fill="#334155" points="221.13,242.0986,230.13,246.0986,226.13,242.0986,230.13,238.0986,221.13,242.0986" style="stroke:#334155;stroke-width:1.0;"/><text fill="#1E293B" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="74" x="238.83" y="215.8565">decomposes to</text></g><!--link DECOMP to OUTCOME--><!--link OUTCOME to CONTROLS--><!--link CONTROLS to MEASURES--><!--link MEASURES to CAPS--><!--link CAPS to BIAN--><!--link BIAN to BPMN--><!--link PROCESS to OUTCOME--><g id="link_PROCESS_OUTCOME"><path d="M248.17,178.3886 C248.17,214.0886 248.17,266.1986 248.17,298.8486 " fill="none" id="PROCESS-to-OUTCOME" style="stroke:#334155;stroke-width:1.0;"/><polygon fill="#334155" points="248.17,304.8486,252.17,295.8486,248.17,299.8486,244.17,295.8486,248.17,304.8486" style="stroke:#334155;stroke-width:1.0;"/><text fill="#1E293B" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="46" x="249.17" y="238.9365">produces</text></g><!--link PROCESS to CONTROLS--><g id="link_PROCESS_CONTROLS"><path d="M277.5,178.1886 C277.5,226.7986 277.5,314.6986 277.5,358.9386 " fill="none" id="PROCESS-to-CONTROLS" style="stroke:#334155;stroke-width:1.0;"/><polygon fill="#334155" points="277.5,364.9386,281.5,355.9386,277.5,359.9386,273.5,355.9386,277.5,364.9386" style="stroke:#334155;stroke-width:1.0;"/><text fill="#1E293B" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="83" x="278.5" y="268.8765">is constrained by</text></g><!--link PROCESS to MEASURES--><g id="link_PROCESS_MEASURES"><path d="M315.5,178.2586 C315.5,237.2986 315.5,360.1286 315.5,419.0686 " fill="none" id="PROCESS-to-MEASURES" style="stroke:#334155;stroke-width:1.0;"/><polygon fill="#334155" points="315.5,425.0686,319.5,416.0686,315.5,420.0686,311.5,416.0686,315.5,425.0686" style="stroke:#334155;stroke-width:1.0;"/><text fill="#1E293B" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="74" x="240.5" y="298.9765">is measured by</text></g><!--link PROCESS to CAPS--><g id="link_PROCESS_CAPS"><path d="M353.5,178.3686 C353.5,248.8086 353.5,415.5886 353.5,492.0886 " fill="none" id="PROCESS-to-CAPS" style="stroke:#334155;stroke-width:1.0;"/><polygon fill="#334155" points="353.5,498.0886,357.5,489.0886,353.5,493.0886,349.5,489.0886,353.5,498.0886" style="stroke:#334155;stroke-width:1.0;"/><text fill="#1E293B" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="48" x="304.5" y="335.5465">exercises</text></g><!--link PROCESS to BIAN--><g id="link_PROCESS_BIAN"><path d="M391.5,178.3986 C391.5,262.0686 391.5,487.4086 391.5,578.7686 " fill="none" id="PROCESS-to-BIAN" style="stroke:#334155;stroke-width:1.0;"/><polygon fill="#334155" points="391.5,584.7686,395.5,575.7686,391.5,579.7686,387.5,575.7686,391.5,584.7686" style="stroke:#334155;stroke-width:1.0;"/