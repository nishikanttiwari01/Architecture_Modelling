<?xml version="1.0" encoding="us-ascii" standalone="no"?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="938px" preserveAspectRatio="none" style="width:610px;height:938px;background:#FFFFFF;" version="1.1" viewBox="0 0 610 938" width="610px" zoomAndPan="magnify"><defs/><g><text fill="#000000" font-family="Arial" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="464" x="66.25" y="23.1318">Horizon Bank process-architecture decomposition and traceability</text><!--entity FAMILY--><g id="elem_FAMILY"><rect fill="#E0F2FE" height="61.3965" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="205" x="128" y="44.0986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="112" x="138" y="65.3545">CATALOGUE LEVEL</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="185" x="138" y="79.1533">Customer and party management</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="81" x="138" y="92.9521">Process family</text></g><!--entity PROCESS--><g id="elem_PROCESS"><rect fill="#DBEAFE" height="61.3965" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="195" x="133" y="135.0986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="116" x="143" y="156.3545">END-TO-END LEVEL</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="175" x="143" y="170.1533">Establish customer relationship</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="46" x="143" y="183.9521">Process</text></g><!--entity DECOMP--><g id="elem_DECOMP"><rect fill="#F8FAFC" height="102.793" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="214" x="123.5" y="226.0986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="191" x="133.5" y="247.3545">SELECTED SUBPROCESS LEVEL</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="120" x="133.5" y="261.1533">1  Capture application</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="148" x="133.5" y="274.9521">2  Verify identity and screen</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="188" x="133.5" y="288.751">3  Resolve referral [exception path]</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="194" x="133.5" y="302.5498">4  Create party and account records</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="140" x="133.5" y="316.3486">5  Confirm usable service</text></g><!--entity OWNER--><g id="elem_OWNER"><rect fill="#F3E8FF" height="47.5977" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="170" x="434.5" y="141.5986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="101" x="444.5" y="162.8545">ACCOUNTABILITY</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="150" x="444.5" y="176.6533">Onboarding process owner</text></g><!--entity OUTCOME--><g id="elem_OUTCOME"><rect fill="#DCFCE7" height="47.5977" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="175" x="143" y="359.0986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="60" x="153" y="380.3545">OUTCOME</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="155" x="153" y="394.1533">Usable banking relationship</text></g><!--entity CONTROLS--><g id="elem_CONTROLS"><rect fill="#FEE2E2" height="47.5977" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="227" x="117" y="437.0986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="67" x="127" y="458.3545">CONTROLS</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="207" x="127" y="472.1533">Identity evidence | Screening evidence</text></g><!--entity MEASURES--><g id="elem_MEASURES"><rect fill="#FEF3C7" height="61.3965" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="255" x="103" y="515.0986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="66" x="113" y="536.3545">MEASURES</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="235" x="113" y="550.1533">Elapsed time | Straight-through processing</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="161" x="113" y="563.9521">Referral rate | Control failures</text></g><!--entity CAPS--><g id="elem_CAPS"><rect fill="#E0E7FF" height="75.1953" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="253" x="104" y="606.0986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="150" x="114" y="627.3545">CAPABILITIES EXERCISED</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="233" x="114" y="641.1533">Customer Onboarding | Identity Verification</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="146" x="114" y="654.9521">Financial Crime Screening</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="204" x="114" y="668.751">Party Management | Account Opening</text></g><!--entity BIAN--><g id="elem_BIAN"><rect fill="#F1F5F9" height="75.1953" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="295" x="83" y="711.0986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="187" x="93" y="732.3545">REFERENCE RESPONSIBILITIES</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="275" x="93" y="746.1533">Candidate BIAN Service Domains and interactions</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="148" x="93" y="759.9521">BIAN 14.0 logical reference</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="202" x="93" y="773.751">Candidate, partial and many-to-many</text></g><!--entity BPMN--><g id="elem_BPMN"><rect fill="#ECFDF5" height="61.3965" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="323" x="69" y="816.0986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="108" x="79" y="837.3545">SELECTED DETAIL</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="303" x="79" y="851.1533">BPMN collaboration for behaviour and referral exception</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="176" x="79" y="864.9521">Not a full-bank process diagram</text></g><g id="elem_GMN22"><path d="M6,894.0986 L6,931.6963 A0,0 0 0 0 6,931.6963 L455,931.6963 A0,0 0 0 0 455,931.6963 L455,904.0986 L445,894.0986 L234.5,894.0986 L230.5,877.2086 L226.5,894.0986 L6,894.0986 A0,0 0 0 0 6,894.0986 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M445,894.0986 L445,904.0986 L455,904.0986 L445,894.0986 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="235" x="12" y="910.3545">Selected Horizon Bank onboarding excerpt.</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="428" x="12" y="924.1533">Process, capability, BIAN responsibility and implementation are not equivalent.</text></g><!--link FAMILY to PROCESS--><g id="link_FAMILY_PROCESS"><path d="M230.5,105.2386 C230.5,114.8386 230.5,119.4986 230.5,129.0886 " fill="none" id="FAMILY-to-PROCESS" style="stroke:#334155;stroke-width:1.0;"/><polygon fill="#334155" points="230.5,135.0886,234.5,126.0886,230.5,130.0886,226.5,126.0886,230.5,135.0886" style="stroke:#334155;stroke-width:1.0;"/><text fill="#1E293B" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="41" x="231.5" y="124.4165">contains</text></g><!--reverse link PROCESS to OWNER--><g id="link_PROCESS_OWNER"><path d="M334.34,165.5986 C368.73,165.5986 401.07,165.5986 434.33,165.5986 " fill="none" id="PROCESS-backto-OWNER" style="stroke:#334155;stroke-width:1.0;"/><polygon fill="#334155" points="328.34,165.5986,337.34,169.5986,333.34,165.5986,337.34,161.5986,328.34,165.5986" style="stroke:#334155;stroke-width:1.0;"/><text fill="#1E293B" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="87" x="337.75" y="159.9165">is accountable for</text></g><!--link PROCESS to DECOMP--><g id="link_PROCESS_DECOMP"><path d="M230.5,196.3686 C230.5,205.5286 230.5,209.8786 230.5,220.0386 " fill="none" id="PROCESS-to-DECOMP" style="stroke:#334155;stroke-width:1.0;"/><polygon fill="#334155" points="230.5,226.0386,234.5,217.0386,230.5,221.0386,226.5,217.0386,230.5,226.0386" style="stroke:#334155;stroke-width:1.0;"/><text fill="#1E293B" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="74" x="231.5" y="215.4165">decomposes to</text></g><!--link DECOMP to OUTCOME--><g id="link_DECOMP_OUTCOME"><path d="M230.5,329.1386 C230.5,339.6086 230.5,344.1386 230.5,353.0286 " fill="none" id="DECOMP-to-OUTCOME" style="stroke:#334155;stroke-width:1.0;"/><polygon fill="#334155" points="230.5,359.0286,234.5,350.0286,230.5,354.0286,226.5,350.0286,230.5,359.0286" style="stroke:#334155;stroke-width:1.0;"/><text fill="#1E293B" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="46" x="231.5" y="348.4165">produces</text></g><!--link OUTCOME to CONTROLS--><g id="link_OUTCOME_CONTROLS"><path d="M230.5,407.3186 C230.5,416.7386 230.5,421.6086 230.5,431.0286 " fill="none" id="OUTCOME-to-CONTROLS" style="stroke:#334155;stroke-width:1.0;"/><polygon fill="#334155" points="230.5,437.0286,234.5,428.0286,230.5,432.0286,226.5,428.0286,230.5,437.0286" style="stroke:#334155;stroke-width:1.0;"/><text fill="#1E293B" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="83" x="231.5" y="426.4165">is constrained by</text></g><!--link CONTROLS to MEASURES--><g id="link_CONTROLS_MEASURES"><path d="M230.5,485.5186 C230.5,494.6686 230.5,499.2586 230.5,508.9286 " fill="none" id="CONTROLS-to-MEASURES" style="stroke:#334155;stroke-width:1.0;"/><polygon fill="#334155" points="230.5,514.9286,234.5,505.9286,230.5,509.9286,226.5,505.9286,230.5,514.9286" style="stroke:#334155;stroke-width:1.0;"/><text fill="#1E293B" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="74" x="231.5" y="504.4165">is measured by</text></g><!--link MEASURES to CAPS--><g id="link_MEASURES_CAPS"><path d="M230.5,576.1886 C230.5,585.5486 230.5,590.0186 230.5,599.8286 " fill="none" id="MEASURES-to-CAPS" style="stroke:#334155;stroke-width:1.0;"/><polygon fill="#334155" points="230.5,605.8286,234.5,596.8286,230.5,600.8286,226.5,596.8286,230.5,605.8286" style="stroke:#334155;stroke-width:1.0;"/><text fill="#1E293B" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="48" x="231.5" y="595.4165">exercises</text></g><!--link CAPS to BIAN--><g id="link_CAPS_BIAN"><path d="M230.5,681.1986 C230.5,690.7986 230.5,695.1586 230.5,704.7686 " fill="none" id="CAPS-to-BIAN" style="stroke:#334155;stroke-width:1.0;"/><polygon fill="#334155" points="230.5,710.7686,234.5,701.7686,230.5,705.7686,226.5,701.7686,230.5,710.7686" style="stroke:#334155;stroke-width:1.0;"/><text fill="#1E293B" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="68" x="231.5" y="700.4165">is informed by</text></g><!--link BIAN to BPMN--><g id="link_BIAN_BPMN"><path d="M230.5,786.1686 C230.5,796.0186 230.5,800.5586 230.5,809.9886 " fill="none" id="BIAN-to-BPMN"