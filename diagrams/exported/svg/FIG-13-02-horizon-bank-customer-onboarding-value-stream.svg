  <text x="1225.0" y="189.8" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#111827">use the selected Horizon</text>
  <text x="1225.0" y="204.2" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#111827">Bank channels and</text>
  <text x="1225.0" y="218.4" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#111827">products.</text>
  <rect x="20.0" y="470.0" width="1140.0" height="70.0" rx="8" ry="8" fill="#FFF8DC" stroke="#8A6D3B" stroke-width="1"/>
  <text x="26.0" y="487.0" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#111827">Note: Each stage is a stakeholder-value outcome, not an internal activity. Capabilities beneath each stage enable it; capability names are controlled (examples/horizon-bank/capabilities.md). Use BPMN for detailed onboarding</text>
  <text x="26.0" y="501.3" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#111827">exceptions, roles, sequence and hand-offs. This is not a customer journey or Lean value stream map.</text>
