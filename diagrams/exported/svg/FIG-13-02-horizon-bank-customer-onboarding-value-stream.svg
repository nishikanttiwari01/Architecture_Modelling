  <text x="846.0" y="175.6" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#111827">Customer and product records</text>
  <text x="846.0" y="189.9" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#111827">exist in the bank&#x27;s authoritative</text>
  <text x="846.0" y="204.2" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#111827">systems.</text>
  <text x="846.0" y="273.9" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#111827">Enabling capabilities</text>
