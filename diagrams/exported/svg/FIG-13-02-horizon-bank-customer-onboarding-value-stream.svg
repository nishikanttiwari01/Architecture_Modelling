  <title id="ttl">FIG-13-02. Horizon Bank Customer Onboarding Value Stream</title>
  <desc id="dsc">FIG-13-02. Horizon Bank Customer Onboarding Value Stream</desc>
  <rect x="0" y="0" width="1320" height="560" fill="#FFFFFF"/>
  <text x="590.0" y="32.6" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#111827">FIG-13-02. Horizon Bank Customer Onboarding Value Stream</text>
  <text x="590.0" y="58.2" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-style="italic" fill="#111827">Value stream teaching view. Stages show stakeholder value, not BPMN tasks. Value progresses left to right.</text>
