  <text x="458.0" y="175.6" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#111827">The bank has enough</text>
  <text x="458.0" y="189.9" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#111827">structured application</text>
  <text x="458.0" y="204.2" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#111827">information to proceed.</text>
  <text x="458.0" y="273.9" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#111827">Enabling capabilities</text>
