  <text x="85.0" y="173.6" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#111827">Retail Customer</text>
  <text x="85.0" y="189.2" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#111827">(triggering</text>
  <text x="85.0" y="204.8" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#111827">stakeholder)</text>
