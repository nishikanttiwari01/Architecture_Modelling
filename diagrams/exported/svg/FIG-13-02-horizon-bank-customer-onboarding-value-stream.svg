  <rect x="568.0" y="140.0" width="168.0" height="92.0" rx="8" ry="8" fill="#F7F9FB" stroke="#175CD3" stroke-width="1"/>
  <text x="652.0" y="175.6" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#111827">The customer can be assessed</text>
  <text x="652.0" y="189.9" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#111827">against identity, eligibility and</text>
  <text x="652.0" y="204.2" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#111827">financial-crime expectations.</text>
  <text x="652.0" y="273.9" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#111827">Enabling capabilities</text>
