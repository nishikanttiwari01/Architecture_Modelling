  <text x="1040.0" y="175.6" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#111827">The customer can use the</text>
  <text x="1040.0" y="189.9" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#111827">selected channels and</text>
  <text x="1040.0" y="204.2" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#111827">products.</text>
  <text x="1040.0" y="273.9" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#111827">Enabling capabilities</text>
