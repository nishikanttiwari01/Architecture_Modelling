  <text x="264.0" y="117.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#111827">1. Need understood</text>
  <rect x="180.0" y="140.0" width="168.0" height="92.0" rx="8" ry="8" fill="#F7F9FB" stroke="#175CD3" stroke-width="1"/>
  <text x="264.0" y="175.6" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#111827">The prospective customer has</text>
  <text x="264.0" y="189.9" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#111827">made the banking need clear</text>
  <text x="264.0" y="204.2" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#111827">enough for the bank to respond.</text>
  <text x="264.0" y="273.9" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#111827">Enabling capabilities</text>
