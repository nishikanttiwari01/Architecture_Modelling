  <text x="26.0" y="545.0" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#111827">Scoring definitions (illustrative):</text>
  <text x="26.0" y="559.3" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#111827">Current pain: High = frequent operational problems or high manual effort today; Medium = occasional problems or moderate effort; Low =</text>
  <text x="26.0" y="573.6" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#111827">mostly stable.</text>
  <text x="26.0" y="587.9" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#111827">Strategic importance: High = strongly linked to strategy or differentiation; Medium = supports strategy indirectly; Low = limited strategic</text>
  <text x="26.0" y="602.2" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#111827">influence.</text>
  <text x="26.0" y="616.5" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#111827">Delivery risk: High = complex change with legacy or governance dependencies; Medium = moderate complexity; Low = well understood, low</text>
  <text x="26.0" y="630.8" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#111827">dependency.</text>
  <rect x="20.0" y="656.0" width="700.0" height="92.0" rx="8" ry="8" fill="#FFF8DC" stroke="#8A6D3B" stroke-width="1"/>
  <text x="26.0" y="673.0" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#111827">Legend: rating shown as text (High, Medium, Low) and shading; darker shading = higher rating. Colour supports the text; meaning is readable</text>
  <text x="26.0" y="687.3" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#111827">in greyscale. No composite score is calculated. Dimensions are kept separate.</text>
  <text x="26.0" y="701.6" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#111827">Assessment date: 2026-07-02. Owner: illustrative Horizon Bank architecture workshop group. Version: 1.0.</text>
  <text x="26.0" y="715.9" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#111827">The values are illustrative teaching figures, not a factual assessment of a real bank. Capability names: examples/horizon-bank/capabilities.md.</text>
