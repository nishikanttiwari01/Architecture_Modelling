<?xml version="1.0" encoding="us-ascii" standalone="no"?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="816px" preserveAspectRatio="none" style="width:1208px;height:816px;background:#FFFFFF;" version="1.1" viewBox="0 0 1208 816" width="1208px" zoomAndPan="magnify"><defs/><g><text fill="#000000" font-family="Arial" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="465" x="364.5" y="23.1318">FIG-13-01. Online Store SysML-style Requirement Traceability View</text><text fill="#000000" font-family="Arial" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="282" x="456" y="39.2305">Simplified, non-normative teaching view</text><!--entity R1--><g id="elem_R1"><rect fill="#EEF4FF" height="108.4932" rx="4" ry="4" style="stroke:#175CD3;stroke-width:0.5;" width="195" x="15" y="564.1973"/><text fill="#000000" font-family="Arial" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="97" x="64" y="587.3291">&#171;Requirement&#187;</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="76" x="25" y="603.4277">REQ-OS-01</text><line style="stroke:#175CD3;stroke-width:1.0;" x1="16" x2="209" y1="606.3945" y2="606.3945"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="175" x="25" y="623.5264">Checkout shall not store full</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="174" x="25" y="639.625">customer card details in the</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="83" x="25" y="655.7236">Online Store.</text></g><!--entity R2--><g id="elem_R2"><rect fill="#EEF4FF" height="108.4932" rx="4" ry="4" style="stroke:#175CD3;stroke-width:0.5;" width="210" x="7.5" y="341.1973"/><text fill="#000000" font-family="Arial" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="97" x="64" y="364.3291">&#171;Requirement&#187;</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="76" x="17.5" y="380.4277">REQ-OS-02</text><line style="stroke:#175CD3;stroke-width:1.0;" x1="8.5" x2="216.5" y1="383.3945" y2="383.3945"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="190" x="17.5" y="400.5264">The customer shall receive an</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="172" x="17.5" y="416.625">order confirmation after the</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="114" x="17.5" y="432.7236">order is accepted.</text></g><!--entity R3--><g id="elem_R3"><rect fill="#EEF4FF" height="108.4932" rx="4" ry="4" style="stroke:#175CD3;stroke-width:0.5;" width="211" x="7" y="119.1973"/><text fill="#000000" font-family="Arial" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="97" x="64" y="142.3291">&#171;Requirement&#187;</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="76" x="17" y="158.4277">REQ-OS-03</text><line style="stroke:#175CD3;stroke-width:1.0;" x1="8" x2="217" y1="161.3945" y2="161.3945"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="191" x="17" y="178.5264">Support users shall view order</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="154" x="17" y="194.625">status without seeing full</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="103" x="17" y="210.7236">payment details.</text></g><!--entity D1--><g id="elem_D1"><rect fill="#F7F9FB" height="100.4932" rx="4" ry="4" style="stroke:#175CD3;stroke-width:0.5;" width="217" x="366" y="506.1973"/><text fill="#000000" font-family="Arial" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="60" x="444.5" y="529.3291">&#171;Design&#187;</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="162" x="376" y="545.4277">Payment Provider System</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="177" x="376" y="561.5264">delegation: the Online Store</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="197" x="376" y="577.625">stores only payment status and</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="121" x="376" y="593.7236">provider reference.</text></g><!--entity D2--><g id="elem_D2"><rect fill="#F7F9FB" height="100.4932" rx="4" ry="4" style="stroke:#175CD3;stroke-width:0.5;" width="215" x="367" y="283.1973"/><text fill="#000000" font-family="Arial" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="60" x="444.5" y="306.3291">&#171;Design&#187;</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="195" x="377" y="322.4277">Order record and confirmation:</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="182" x="377" y="338.5264">the order service creates the</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="188" x="377" y="354.625">order record and triggers web</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="135" x="377" y="370.7236">or email confirmation.</text></g><!--entity D3--><g id="elem_D3"><rect fill="#F7F9FB" height="100.4932" rx="4" ry="4" style="stroke:#175CD3;stroke-width:0.5;" width="208" x="370.5" y="60.1973"/><text fill="#000000" font-family="Arial" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="60" x="444.5" y="83.3291">&#171;Design&#187;</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="160" x="380.5" y="99.4277">Masked support view: the</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="188" x="380.5" y="115.5264">support interface shows order</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="170" x="380.5" y="131.625">state and masked payment</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="72" x="380.5" y="147.7236">status only.</text></g><!--entity V1--><g id="elem_V1"><rect fill="#FFF7E6" height="68.2959" rx="4" ry="4" style="stroke:#B54708;stroke-width:0.5;" width="189" x="652" y="589.1973"/><text fill="#000000" font-family="Arial" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="86" x="703.5" y="612.3291">&#171;Verification&#187;</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="153" x="662" y="628.4277">Verify card-data storage</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="169" x="662" y="644.5264">boundary during checkout.</text></g><!--entity V2--><g id="elem_V2"><rect fill="#FFF7E6" height="68.2959" rx="4" ry="4" style="stroke:#B54708;stroke-width:0.5;" width="157" x="668" y="366.1973"/><text fill="#000000" font-family="Arial" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="86" x="703.5" y="389.3291">&#171;Verification&#187;</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="137" x="678" y="405.4277">Verify accepted-order</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="81" x="678" y="421.5264">confirmation.</text></g><!--entity V3--><g id="elem_V3"><rect fill="#FFF7E6" height="68.2959" rx="4" ry="4" style="stroke:#B54708;stroke-width:0.5;" width="205" x="644" y="159.1973"/><text fill="#000000" font-family="Arial" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="86" x="703.5" y="182.3291">&#171;Verification&#187;</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="181" x="654" y="198.4277">Verify support-role access to</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="185" x="654" y="214.5264">masked payment information.</text></g><!--entity E1--><g id="elem_E1"><rect fill="#ECFDF3" height="68.2959" rx="4" ry="4" style="stroke:#027A48;stroke-width:0.5;" width="191" x="1003" y="589.1973"/><text fill="#000000" font-family="Arial" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="73" x="1062" y="612.3291">&#171;Evidence&#187;</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="145" x="1013" y="628.4277">Security test result and</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="171" x="1013" y="644.5264">provider integration review.</text></g><!--entity E2--><g id="elem_E2"><rect fill="#ECFDF3" height="68.2959" rx="4" ry="4" style="stroke:#027A48;stroke-width:0.5;" width="180" x="1008.5" y="366.1973"/><text fill="#000000" font-family="Arial" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="73" x="1062" y="389.3291">&#171;Evidence&#187;</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="160" x="1018.5" y="405.4277">Functional test result and</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="134" x="1018.5" y="421.5264">message-log sample.</text></g><!--entity E3--><g id="elem_E3"><rect fill="#ECFDF3" height="68.2959" rx="4" ry="4" style="stroke:#027A48;stroke-width:0.5;" width="207" x="995" y="159.1973"/><text fill="#000000" font-family="Arial" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="73" x="1062" y="182.3291">&#171;Evidence&#187;</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="187" x="1005" y="198.4277">Access-control test result and</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="125" x="1005" y="214.5264">support-role review.</text></g><!--link R1 to D1--><g id="link_R1_D1"><path d="M210.45,601.4973 C258.45,593.2373 310.637,584.2453 360.007,575.7453 " fill="none" id="R1-to-D1" style="stroke:#333333;stroke-width:1.2;"/><polygon fill="#333333" points="365.92,574.7273,356.3718,572.3123,360.9925,575.5756,357.7292,580.1963,365.92,574.7273" style="stroke:#333333;stroke-width:1.2;"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="86" x="249" y="577.3291">addressed by</text></g><!--link R2 to D2--><g id="link_R2_D2"><path d="M217.63,377.2673 C264.45,369.1973 313.7569,360.7048 360.8869,352.5948 " fill="none" id="R2-to-D2" style="stroke:#333333;stroke-width:1.2;"/><polygon fill="#333333" points="366.8,351.5773,357.252,349.1615,361.8724,352.4252,358.6087,357.0456,366.8,351.5773" style="stroke:#333333;stroke-width:1.2;"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="86" x="249" y="355.3291">addressed by</text></g><!--link R3 to D3--><g id="link_R3_D3"><path d="M218.11,154.8873 C266.07,146.4973 316.8297,137.6108 364.5797,129.2608 " fill="none" id="R3-to-D3" style="stroke:#333333;stroke-width:1.2;"/><polygon fill="#333333" points="370.49,128.2273,360.9355,125.8374,365.5647,129.0885,362.3135,133.7178,370.49,128.2273" style="stroke:#333333;stroke-width:1.2;"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="86" x="249" y="132.3291">addressed by</text></g><!--link R1 to V1--><g id="link_R1_V1"><path d="M210.17,629.5473 C257.13,634.5073 314.43,639.7473 366,642.1973 C462.34,646.7673 486.72,647.8073 583,642.1973 C605.4,640.8873 623.4886,639.2667 646.0386,636.6967 " fill="none" id="R1-to-V1" style="stroke:#333333;stroke-width:1.2;"/><polygon fill="#333333" points="652,636.0173,642.6049,633.0621,647.0322,636.5834,643.5108,641.0107,652,636.0173" style="stroke:#333333;stroke-width:1.2;"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="65" x="442" y="638.3291">verified by</text></g><!--link R2 to V2--><g id="link_R2_V2"><path d="M217.78,406.8373 C263.24,411.3573 317.19,415.9773 366,418.1973 C462.34,422.5773 486.7,423.5173 583,418.1973 C610.77,416.6673 635.1401,414.3598 661.9901,411.2398 " fill="none" id="R2-to-V2" style="stroke:#333333;stroke-width:1.2;"/><polygon fill="#333333" points="667.95,410.5473,658.5485,407.6128,662.9834,411.1244,659.4719,415.5594,667.95,410.5473" style="stroke:#333333;stroke-width:1.2;"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="65" x="442" y="414.3291">verified by</text></g><!--link R3 to V3--><g id="link_R3_V3"><path d="M218.1,184.3673 C263.49,188.6773 317.31,193.0773 366,195.1973 C462.35,199.3873 486.56,195.7873 583,195.1973 C602.61,195.0773 617.5504,194.9459 637.6504,194.7159 " fill="none" id="R3-to-V3" style="stroke:#333333;stroke-width:1.2;"/><polygon fill="#333333" points="643.65,194.6473,634.6048,190.7505,638.6503,194.7045,634.6964,198.75,643.65,194.6473" style="stroke:#333333;stroke-width:1.2;"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="65" x="442" y="191.3291">verified by</text></g><!--link V1 to E1--><g id="link_V1_E1"><path d="M841.29,623.1973 C891.31,623.1973 946.69,623.1973 996.84,623.1973 " fill="none" id="V1-to-E1" style="stroke:#333333;stroke-width:1.2;"/><polygon fill="#333333" points="1002.84,623.1973,993.84,619.1973,997.84,623.1973,993.84,627.1973,1002.84,623.1973" style="stroke:#333333;stroke-width:1.2;"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="84" x="880" y="619.3291">evidenced by</text></g><!--link V2 to E2--><g id="link_V2_E2"><path d="M825.18,400.1973 C879.35,400.1973 945.77,400.1973 1002.31,400.1973 " fill="none" id="V2-to-E2" style="stroke:#333333;stroke-width:1.2;"/><polygon fill="#333333" points="1008.31,400.1973,999.31,396.1973,1003.31,400.1973,999.31,404.1973,1008.31,400.1973" style="stroke:#333333;stroke-width:1.2;"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="84" x="880" y="396.3291">evidenced by</text></g><!--link V3 to E3--><g id="link_V3_E3"><path d="M849.2,193.1973 C895.02,193.1973 943.02,193.1973 988.94,193.1973 " fill="none" id="V3-to-E3" style="stroke:#333333;stroke-width:1.2;"/><polygon fill="#333333" points="994.94,193.1973,985.94,189.1973,989.94,193.1973,985.94,197.1973,994.94,193.1973" style="stroke:#333333;stroke-width:1.2;"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="84" x="880" y="189.3291">evidenced by</text></g><!--link D1 to V1--><!--link D2 to V2--><!--link D3 to V3--><rect fill="none" height="106.5918" id="_legend" rx="7.5" ry="7.5" style="stroke:#000000;stroke-width:1.0;" width="774" x="210" y="689.6904"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="764" x="215" y="707.8223">Element types (shown as stereotypes): Requirement, Design (design response), Verification (verification case), Evidence.</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="467" x="215" y="723.9209">Left to right: Requirement | Design response | Verification case | Evidence.</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="608" x="215" y="740.0195">addressed by connects a requirement to its design response. verified by connects a requirement</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="555" x="215" y="756.1182">directly to its verification case. evidenced by connects a verification case to its evidence.</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="557" x="215" y="772.2168">A trace is a navigable claim for review. It does not prove that the requirement is satisfied,</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="384" x="215" y="788.3154">that the implementation is correct, or that verification passed.</text><!--SRC=[fLPTRzis57tNhxZh7fO2aHlRwT8PHO1yM5k15ccTmY_p7cZfMYP2aHf9EJ3M_VTUafAdhs0O5WI9JLBd7fvpBgaVk4n5bI5C9c_erzYZGFEc54pQgX2ntME1av8-Hf70dGMhGFDyRo7Z6bFBbOmijm8X-V1hF9t75zC9F4Z19SAZLPh-7isdZx77XHN-MT5Z1KeBNpLBaMsvuFO8QuxF6_d8YrBm7SVi7AIIiLIwO9OV42ooTCzb3WTQ64NcYSkIQLQ0uy1aBd2bAfdTAIrHmxkn1U_VjwfVNyDV4S2jqXdgEoMKXX-dLs_lxkTkbALFkGvuVcQvJ2wJ9Ffx7FOU3S_bVqDChf9VajkN4DUeIOMKENN7S6_VNbvTl1l5JPAhvSyluIuFF4EPuXZcnUpgvd8KStcNt2Tpmen-0Xgg2WdJHTjA4vrgmAlLyalyy4WnsCYOVZRoRe_faweic3qJWdobJpuOkqg8ZKmh-bQGQIdJ6MHe6HS6k0HAtaQsapHv1NqFcO7LTApwhAd-TOzmAX4Oq79qcM9o8xq2a2gvupvgIWBRMHhorSCiDy3I54kBsGiKPcCKvWs5nweibRPG6TIcvk1Y31v-8urbjZBmpEtUouJeWXxKATdHDqkjomlrvorhPWi8WQHzcb99WnrxFjU0dxLoOT2kFIqM6vcXmDmhi72Rx_ImuqZ_32WfZj1mgdapcH7F1axZ3hNBcATwQWrYUTynwa67rIc9u20w7Ymsqb48yfDg1vwIYngP9GujPrgFMpgKSgVlCsxTD611WdLGXumwldrYvWapCBLRpg55ADOCSKd9sD6fHIQgPzFs3ps98a3K0fsSTQeDYxTDco-WtVFK2ptR_EpHzqYSCSjy2x6So6rTfp9zXApIBZTftMw-OEyWeRBhwGXi4- -utj50jH6SsGXEBLIi5GqwK4DsgOtiwa8wxjI_eBV5kUo9W_KfrYRmY2bjdouIIeXroQ-4xINJkPVh0A7HsUkBjyv4Ahpio9DKqjzmJ0nn2zeS6H0BbODXT6_X65n7fHklI4pgMb9e2DcHxsMANflsJSgoZ60CARob67IRFrfD8OwlgVjWqLaOhMPXOZQOc8U9UN-YL_RWJGbL3_tqmbbuFpZt1_w1ipwnrmspjMFMmcg8hMVzyS1hFU-D4wr1yvn2CcHtYiywr5-w-ktbqJeGMCu64u71SjwV80g_yOo-XpF1zU4JOcde_74HDj1vTLhqXFpMFx5fPBYZRz3a828puz_tlk0VNi68NEoCp2AohpCoT-zlET8fjLMMhiDeAK9rUopfL3rpHvfq-QBhGAFoewyxr_nvG_EiR-Lvb-xP80sqeY4_YJvsjFXVIaoYJlQfioHbZkua0lW7bMfn6konddG2FFve549CbrwDCTZPf9kq5iom9MeCF96_eMlBNIVk3GCaE_2SRQdrKy5u0NH6DeS0VA0t04KkkLvo1nfXxPdrztHxeuHZg9xnRz3HQObxg_OB0XVkOgb3SoeTa3faI-O4dKGKbX2Pw3i0]--></g></svg>