<?xml version="1.0" encoding="us-ascii" standalone="no"?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="751px" preserveAspectRatio="none" style="width:829px;height:751px;background:#FFFFFF;" version="1.1" viewBox="0 0 829 751" width="829px" zoomAndPan="magnify"><defs/><g><text fill="#000000" font-family="Arial" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="320" x="247.5" y="23.1318">FIG-08-05. Horizon Bank payment data lineage</text><!--entity Digital--><g id="elem_Digital"><rect fill="#EAF6E8" height="52.1973" rx="2.5" ry="2.5" style="stroke:#333333;stroke-width:0.5;" width="177" x="139.5" y="44.0986"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="154" x="149.5" y="67.2305">Horizon Digital Channels</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="157" x="149.5" y="83.3291">&#171;Originating application&#187;</text></g><!--entity Instruction--><g id="elem_Instruction"><rect fill="#FFFFFF" height="52.1973" rx="2.5" ry="2.5" style="stroke:#333333;stroke-width:0.5;" width="238" x="109" y="151.0986"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="124" x="119" y="174.2305">Payment instruction</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="218" x="119" y="190.3291">customer, debtor, creditor, amount</text></g><!--entity Payments--><g id="elem_Payments"><rect fill="#EAF6E8" height="52.1973" rx="2.5" ry="2.5" style="stroke:#333333;stroke-width:0.5;" width="247" x="104.5" y="258.0986"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="118" x="114.5" y="281.2305">Payments Platform</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="227" x="114.5" y="297.3291">&#171;Transformation and orchestration&#187;</text></g><