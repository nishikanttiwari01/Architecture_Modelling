<?xml version="1.0" encoding="us-ascii" standalone="no"?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="461px" preserveAspectRatio="none" style="width:398px;height:461px;background:#FFFFFF;" version="1.1" viewBox="0 0 398 461" width="398px" zoomAndPan="magnify"><defs/><g><text fill="#000000" font-family="Arial" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="325" x="29.5" y="23.1318">FIG-08-01. Online Store conceptual data model</text><!--entity Customer--><g id="elem_Customer"><rect fill="#FFFFFF" height="52.1973" rx="2.5" ry="2.5" style="stroke:#333333;stroke-width:0.5;" width="89" x="92" y="44.0986"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="61" x="102" y="67.2305">Customer</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="69" x="102" y="83.3291">&#171;Concept&#187;</text></g><!--entity Basket--><g id="elem_Basket"><rect fill="#F7F9FB" height="52.1973" rx="2.5" ry="2.5" style="stroke:#333333;stroke-width:0.5;" width="89" x="216" y="44.0986"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="43" x="226" y="67.2305">Basket</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="69" x="226" y="83.3291">&#171;Concept&#187;</text></g><!--entity Product--><g id="elem_Product"><rect fill="#F7F9FB" height="52.1973" rx="2.5" ry="2.5" style="stroke:#333333;stroke-width:0.5;" width="89" x="216" y="156.0986"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="49" x="226" y="179.2305">Product</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="69" x="226" y="195.3291">&#171;Concept&#187;</text></g><!--entity Order--><g id="elem_Order"><rect fill="#F7F9FB" height="52.1973" rx="2.5" ry="2.5" style="stroke:#333333;stroke-width:0.