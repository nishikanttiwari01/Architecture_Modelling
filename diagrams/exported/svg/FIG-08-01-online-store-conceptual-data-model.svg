just="spacing" textLength="360" x="12" y="430.4277">It is not a database schema, API contract or process flow.</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="334" x="12" y="446.5264">Returns and support cases are outside this first view.</text></g><!--link Customer to Basket--><g id="link_Customer_Basket"><path d="M181.27,70.0986 C192.51,70.0986 198.56,70.0986 209.8,70.0986 " fill="none" id="Customer-to-Basket" style="stroke:#333333;stroke-width:1.2;"/><polygon fill="#333333" points="215.8,70.0986,206.8,66.0986,210.8,70.0986,206.8,74.0986,215.8,70.0986" style="stroke:#333333;stroke-width:1.2;"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="32" x="182.53" y="84.2305">owns</text></g><!--link Customer to Order--><g id="link_Customer_Order"><path d="M136.5,96.3586 C136.5,114.3286 136.5,132.0686 136.5,150.0086 " fill="none" id="Customer-to-Order" style="stroke:#333333;stroke-width:1.2;"/><polygon fill="#333333" points="136.5,156.0086,140.5,147.0086,136.5,151.0086,132.5,147.0086,136.5,156.0086" style="stroke:#333333;stroke-width:1.2;"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="41" x="94.5" y="122.3105">places</text></g><!--link Basket to Product--><g id="link_Basket_Product"><path d="M260.5,96.3586 C260.5,114.3286 260.5,132.0686 260.5,150.0086 " fill="none" id="Basket-to-Product" style="stroke:#333333;stroke-width:1.2;"/><polygon fill="#333333" points="260.5,156.0086,264.5,147.0086,260.5,151.0086,256.5,147.0086,260.5,156.0086" style="stroke:#333333;stroke-width:1.2;"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="53" x="206.5" y="122.3105">contains</text></g><!--link Order to Product--><g id="link_Order_Product"><path d="M181.27,182.0986 C192.51,182.0986 198.56,182.0986 209.8,182.0986 " fill="none" id="Order-to-Product" style="stroke:#333333;stroke-width:1.2;"/><polygon fill="#333333" p