.7959">audience and evidence</text></g><g id="elem_GMN19"><path d="M6,414.5654 L6,456.7627 A0,0 0 0 0 6,456.7627 L231,456.7627 A0,0 0 0 0 231,456.7627 L231,424.5654 L221,414.5654 L122.5,414.5654 L118.5,379.7154 L114.5,414.5654 L6,414.5654 A0,0 0 0 0 6,414.5654 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M221,414.5654 L221,424.5654 L231,424.5654 L221,414.5654 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="194" x="12" y="432.6973">When several questions apply,</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="204" x="12" y="448.7959">create separate linked artefacts.</text></g><!--link Start to Policy--><g id="link_Start_Policy"><path d="M127.65,327.4154 C144.18,279.1454 186.55,176.5954 261,128.5654 C336.63,79.7754 437.1661,74.554 506.2761,77.684 " fill="none" id="Start-to-Policy" style="stroke:#333333;stroke-width:1.0;"/><polygon fill="#333333" points="512.27,77.9554,503.4602,73.5523,507.2751,77.7292,503.0982,81.5441,512.27,77.9554" style="stroke:#333333;stroke-width:1.0;"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="92" x="319" y="57.6973">What authority</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="140" x="295" y="73.7959">constrains behaviour?</text></g><!--link Start to Table--><g id="link_Start_Table"><path d="M135.41,327.5154 C158.36,292.5054 204.29,231.3354 261,202.5654 C306.43,179.5154 442.9071,169.8282 521.7271,165.9782 " fill="none" id="Start-to-Table" style="stroke:#333333;stroke-width:1.0;"/><polygon fill="#333333" points="527.72,165.6854,518.5356,162.1293,522.726,165.9294,518.9259,170.1198,527.72,165.6854" style="stroke:#333333;stroke-width:1.0;"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="187" x="271.5" y="150.6973">Which condition combina