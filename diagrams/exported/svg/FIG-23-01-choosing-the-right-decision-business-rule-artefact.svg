<?xml version="1.0" encoding="us-ascii" standalone="no"?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="667px" preserveAspectRatio="none" style="width:672px;height:667px;background:#FFFFFF;" version="1.1" viewBox="0 0 672 667" width="672px" zoomAndPan="magnify"><defs/><g><text fill="#000000" font-family="Arial" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="469" x="94.5" y="23.1318">FIG-23-01. Choosing the Right Decision and Business-Rule Artefact</text><!--entity Start--><g id="elem_Start"><rect fill="#DCEAF7" height="52.1973" rx="5" ry="5" style="stroke:#333333;stroke-width:0.5;" width="130" x="53.5" y="327.5654"/><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="82" x="63.5" y="350.6973">Start with the</text><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="110" x="63.5" y="366.7959">decision question</text></g><!--entity Policy--><g id="elem_Policy"><rect fill="#F5F7FA" height="52.1973" rx="5" ry="5" style="stroke:#333333;stroke-width:0.5;" width="140" x="512.5" y="58.5654"/><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="120" x="522.5" y="81.6973">Policy statement or</text><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="118" x="522.5" y="97.7959">Knowledge Source</text></g><!--entity Table--><g id="elem_Table"><rect fill="#F5F7FA" height="36.0986" rx="5" ry="5" style="stroke:#333333;stroke-width:0.5;" width="109" x="528" y="145.5654"/><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="89" x="538" y="168.6973">Decision table</text></g><!--entity Tree--><g id="elem_Tree"><rect fill="#F5F7FA" height="36.0986" rx="5" ry="5" style="stroke:#333333;stroke-width:0.5;" width="103" x="531" y="216.5654"/><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="sp