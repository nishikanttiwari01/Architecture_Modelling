<?xml version="1.0" encoding="us-ascii" standalone="no"?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="878px" preserveAspectRatio="none" style="width:843px;height:878px;background:#FFFFFF;" version="1.1" viewBox="0 0 843 878" width="843px" zoomAndPan="magnify"><defs/><g><text fill="#000000" font-family="Arial" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="372" x="234" y="33.1318">FIG-19-01. Choosing the Right Data Architecture View</text><rect fill="#F1F1F1" height="54.4971" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="107" x="10" y="429.584"/><text fill="#000000" font-family="Arial" font-size="15" lengthAdjust="spacing" textLength="85" x="20" y="453.6538">Start with the</text><text fill="#000000" font-family="Arial" font-size="15" lengthAdjust="spacing" textLength="87" x="20" y="470.9023">data question</text><rect fill="#F1F1F1" height="37.2485" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="164" x="167" y="177.4685"/><text fill="#000000" font-family="Arial" font-size="15" lengthAdjust="spacing" textLength="144" x="177" y="201.5383">Meaning and structure</text><rect fill="#F1F1F1" height="54.4971" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="201" x="381" y="57.0986"/><text fill="#000000" font-family="Arial" font-size="15" lengthAdjust="spacing" textLength="181" x="391" y="81.1685">Which business information</text><text fill="#000000" font-family="Arial" font-size="15" lengthAdjust="spacing" textLength="114" x="391" y="98.417">concepts matter?</text><rect fill="#F1F1F1" height="54.4971" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="125" x="632" y="57.0986"/><text fill="#000000" font-family="Arial" font-size="15" lengthAdjust="spacing" textLength="74" x="642" y="81.1685">Conceptual</text><text fill="#000000" font-family="Arial" font-size="15" lengthAdjust="spacing" textLength="105" x="642" y="98.417">information view</text><path d="M582,84.3472 L592,84.3472 C607,84.3472 607,84.3472 622,84.3472 L632,84.3472 " fill="none" style="stroke:#333333;stroke-width:1.2;"/><path d="M331,196.0928 L341,196.0928 C356,196.0928 356,84.3472 371,84.3472 L381,84.3472 " fill="none" style="stroke:#333333;stroke-width:1.2;"/><rect fill="#F1F1F1" height="54.4971" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="269" x="381" y="131.5957"/><text fill="#000000" font-family="Arial" font-size="15" lengthAdjust="spacing" textLength="249" x="391" y="155.6655">What precise, technology-independent</text><text fill="#000000" font-family="Arial" font-size="15" lengthAdjust="spacing" textLength="138" x="391" y="172.9141">structure is required?</text><rect fill="#F1F1F1" height="37.2485" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="102" x="700" y="140.22"/><text fill="#000000" font-family="Arial" font-size="15" lengthAdjust="spacing" textLength="82" x="710" y="164.2898">Logical ERD</text><path d="M650,158.8442 L660,158.8442 C675,158.8442 675,158.8442 690,158.8442 L700,158.8442 " fill="none" style="stroke:#333333;stroke-width:1.2;"/><path d="M331,196.0928 L341,196.0928 C356,196.0928 356,158.8442 371,158.8442 L381,158.8442 " fill="none" style="stroke:#333333;stroke-width:1.2;"/><rect fill="#F1F1F1" height="54.4971" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="222" x="381" y="206.0928"/><text fill="#000000" font-family="Arial" font-size="15" lengthAdjust="spacing" textLength="129" x="391" y="230.1626">How will the data be</text><text fill="#000000" font-family="Arial" font-size="15" lengthAdjust="spacing" textLength="202" x="391" y="247.4111">stored in a chosen technology?</text><rect fill="#F1F1F1" height="54.4971" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="92" x="653" y="206.0928"/><text fill="#000000" font-family="Arial" font-size="15" lengthAdjust="spacing" textLength="55" x="663" y="230.1626">Physical</text><text fill="#000000" font-family="Arial" font-size="15" lengthAdjust="spacing" textLength="72" x="663" y="247.4111">data model</text><path d="M603,233.3413 L613,233.3413 C628,233.3413 628,233.3413 643,233.3413 L653,233.3413 " fill="none" style="stroke:#333333;stroke-width:1.2;"/><path d="M331,196.0928 L341,196.0928 C356,196.0928 356,233.3413 371,233.3413 L381,233.3413 " fill="none" style="stroke:#333333;stroke-width:1.2;"/><rect fill="#F1F1F1" height="54.4971" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="270" x="381" y="280.5898"/><text fill="#000000" font-family="Arial" font-size="15" lengthAdjust="spacing" textLength="250" x="391" y="304.6597">Which shared subjects, classifications</text><text fill="#000000" font-family="Arial" font-size="15" lengthAdjust="spacing" textLength="223" x="391" y="321.9082">or controlled values are governed?</text><rect fill="#F1F1F1" height="54.4971" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="130" x="701" y="280.5898"/><text fill="#000000" font-family="Arial" font-size="15" lengthAdjust="spacing" textLength="110" x="711" y="304.6597">Master/reference</text><text fill="#000000" font-family="Arial" font-size="15" lengthAdjust="spacing" textLength="95" x="711" y="321.9082">data catalogue</text><path d="M651,307.8384 L661,307.8384 C676,307.8384 676,307.8384 691,307.8384 L701,307.8384 " fill="none" style="stroke:#333333;stroke-width:1.2;"/><path d="M331,196.0928 L341,196.0928 C356,196.0928 356,307.8384 371,307.8384 L381,307.8384 " fill="none" style="stroke:#333333;stroke-width:1.2;"/><path d="M117,456.8325 L127,456.8325 C142,456.8325 142,196.0928 157,196.0928 L167,196.0928 " fill="none" style="stroke:#333333;stroke-width:1.2;"/><rect fill="#F1F1F1" height="37.2485" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="188" x="167" y="400.9597"/><text fill="#000000" font-family="Arial" font-size="15" lengthAdjust="spacing" textLength="168" x="177" y="425.0295">Movement and traceability</text><rect fill="#F1F1F1" height="54.4971" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="176" x="405" y="355.0869"/><text fill="#000000" font-family="Arial" font-size="15" lengthAdjust="spacing" textLength="156" x="415" y="379.1567">Where does data move,</text><text fill="#000000" font-family="Arial" font-size="15" lengthAdjust="spacing" textLength="128" x="415" y="396.4053">transform and rest?</text><rect fill="#F1F1F1" height="54.4971" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="118" x="631" y="355.0869"/><text fill="#000000" font-family="Arial" font-size="15" lengthAdjust="spacing" textLength="61" x="641" y="379.1567">Data flow</text><text fill="#000000" font-family="Arial" font-size="15" lengthAdjust="spacing" textLength="98" x="641" y="396.4053">diagram (DFD)</text><path d="M581,382.3354 L591,382.3354 C606,382.3354 606,382.3354 621,382.3354 L631,382.3354 " fill="none" style="stroke:#333333;stroke-width:1.2;"/><path d="M355,419.584 L365,419.584 C380,419.584 380,382.3354 395,382.3354 L405,382.3354 " fill="none" style="stroke:#333333;stroke-width:1.2;"/><rect fill="#F1F1F1" height="54.4971" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="262" x="405" y="429.584"/><text fill="#000000" font-family="Arial" font-size="15" lengthAdjust="spacing" textLength="242" x="415" y="453.6538">Where did a value originate, how was</text><text fill="#000000" font-family="Arial" font-size="15" lengthAdjust="spacing" textLength="232" x="415" y="470.9023">it transformed and where is it used?</text><rect fill="#F1F1F1" height="54.4971" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="101" x="717" y="429.584"/><text fill="#000000" font-family="Arial" font-size="15" lengthAdjust="spacing" textLength="81" x="727" y="453.6538">Data lineage</text><text fill="#000000" font-family="Arial" font-size="15" lengthAdjust="spacing" textLength="29" x="727" y="470.9023">view</text><path d="M667,456.8325 L677,456.8325 C692,456.8325 692,456.8325 707,456.8325 L717,456.8325 " fill="none" style="stroke:#333333;stroke-width:1.2;"/><path d="M355,419.584 L365,419.584 C380,419.584 380,456.8325 395,456.8325 L405,456.8325 " fill="none" style="stroke:#333333;stroke-width:1.2;"/><path d="M117,456.8325 L127,456.8325 C142,456.8325 142,419.584 157,419.584 L167,419.584 " fill="none" style="stroke:#333333;stroke-width:1.2;"/><rect fill="#F1F1F1" height="37.2485" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="163" x="167" y="549.9539"/><text fill="#000000" font-family="Arial" font-size="15" lengthAdjust="spacing" textLength="143" x="177" y="574.0237">Governance over time</text><rect fill="#F1F1F1" height="54.4971" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="201" x="380" y="504.0811"/><text fill="#000000" font-family="Arial" font-size="15" lengthAdjust="spacing" textLength="157" x="390" y="528.1509">Who is accountable and</text><text fill="#000000" font-family="Arial" font-size="15" lengthAdjust="spacing" textLength="181" x="390" y="545.3994">who performs stewardship?</text><rect fill="#F1F1F1" height="54.4971" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="91" x="631" y="504.0811"/><text fill="#000000" font-family="Arial" font-size="15" lengthAdjust="spacing" textLength="71" x="641" y="528.1509">Ownership</text><text fill="#000000" font-family="Arial" font-size="15" lengthAdjust="spacing" textLength="40" x="641" y="545.3994">matrix</text><path d="M581,531.3296 L591,531.3296 C606,531.3296 606,531.3296 621,531.3296 L631,531.3296 " fill="none" style="stroke:#333333;stroke-width:1.2;"/><path d="M330,568.5781 L340,568.5781 C355,568.5781 355,531.3296 370,531.3296 L380,531.3296 " fill="none" style="stroke:#333333;stroke-width:1.2;"/><rect fill="#F1F1F1" height="54.4971" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="223" x="380" y="578.5781"/><text fill="#000000" font-family="Arial" font-size="15" lengthAdjust="spacing" textLength="185" x="390" y="602.6479">What happens from creation</text><text fill="#000000" font-family="Arial" font-size="15" lengthAdjust="spacing" textLength="203" x="390" y="619.8965">through retention and disposal?</text><rect fill="#F1F1F1" height="54.4971" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="107" x="653" y="578.5781"/><text fill="#000000" font-family="Arial" font-size="15" lengthAdjust="spacing" textLength="87" x="663" y="602.6479">Data lifecycle</text><text fill="#000000" font-family="Arial" font-size="15" lengthAdjust="spacing" textLength="29" x="663" y="619.8965">view</text><path d="M603,605.8267 L613,605.8267 C628,605.8267 628,605.8267 643,605.8267 L653,605.8267 " fill="none" style="stroke:#333333;stroke-width:1.2;"/><path d="M330,568.5781 L340,568.5781 C355,568.5781 355,605.8267 370,605.8267 L380,605.8267 " fill="none" style="stroke:#333333;stroke-width:1.2;"/><path d="M117,456.8325 L127,456.8325 C142,456.8325 142,568.5781 157,568.5781 L167,568.5781 " fill="none" style="stroke:#333333;stroke-width:1.2;"/><rect fill="#F1F1F1" height="37.2485" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="118" x="167" y="736.1965"/><text fill="#000000" font-family="Arial" font-size="15" lengthAdjust="spacing" textLength="98" x="177" y="760.2664">Before drawing</text><rect fill="#F1F1F1" height="54.4971" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="185" x="335" y="653.0752"/><text fill="#000000" font-family="Arial" font-size="15" lengthAdjust="spacing" textLength="165" x="345" y="677.145">State audience, boundary</text><text fill="#000000" font-family="Arial" font-size="15" lengthAdjust="spacing" textLength="133" x="345" y="694.3936">and abstraction level</text><rect fill="#F1F1F1" height="54.4971" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="135" x="570" y="653.0752"/><text fill="#000000" font-family="Arial" font-size="15" lengthAdjust="spacing" textLength="115" x="580" y="677.145">Keep one primary</text><text fill="#000000" font-family="Arial" font-size="15" lengthAdjust="spacing" textLength="113" x="580" y="694.3936">question per view</text><path d="M520,680.3237 L530,680.3237 C545,680.3237 545,680.3237 560,680.3237 L570,680.3237 " fill="none" style="stroke:#333333;stroke-width:1.2;"/><path d="M285,754.8208 L295,754.8208 C310,754.8208 310,680.3237 325,680.3237 L335,680.3237 " fill="none" style="stroke:#333333;stroke-width:1.2;"/><rect fill="#F1F1F1" height="37.2485" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="177" x="335" y="736.1965"/><text fill="#000000" font-family="Arial" font-size="15" lengthAdjust="spacing" textLength="157" x="345" y="760.2664">More than one concern?</text><rect fill="#F1F1F1" height="54.4971" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="232" x="562" y="727.5723"/><text fill="#000000" font-family="Arial" font-size="15" lengthAdjust="spacing" textLength="169" x="572" y="751.6421">Use separate linked views</text><text fill="#000000" font-family="Arial" font-size="15" lengthAdjust="spacing" textLength="212" x="572" y="768.8906">with stable names and identifiers</text><path d="M512,754.8208 L522,754.8208 C537,754.8208 537,754.8208 552,754.8208 L562,754.8208 " fill="none" style="stroke:#333333;stroke-width:1.2;"/><path d="M285,754.8208 L295,754.8208 C310,754.8208 310,754.8208 325,754.8208 L335,754.8208 " fill="none" style="stroke:#333333;stroke-width:1.2;"/><rect fill="#F1F1F1" height="37.2485" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="103" x="335" y="810.6936"/><text fill="#000000" font-family="Arial" font-size="15" lengthAdjust="spacing" textLength="83" x="345" y="834.7634">Still unclear?</text><rect fill="#F1F1F1" height="54.4971" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:1.5;" width="183" x="488" y="802.0693"/><text fill="#000000" font-family="Arial" font-size="15" lengthAdjust="spacing" textLength="1