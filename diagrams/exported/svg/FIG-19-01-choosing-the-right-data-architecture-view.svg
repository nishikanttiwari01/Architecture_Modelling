<?xml version="1.0" encoding="us-ascii" standalone="no"?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="1180px" preserveAspectRatio="none" style="width:783px;height:1180px;background:#FFFFFF;" version="1.1" viewBox="0 0 783 1180" width="783px" zoomAndPan="magnify"><defs/><g><text fill="#000000" font-family="Arial" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="372" x="198.5" y="23.1318">FIG-19-01. Choosing the Right Data Architecture View</text><!--entity START--><g id="elem_START"><rect fill="#E8F1F8" height="36.0986" rx="6" ry="6" style="stroke:#333333;stroke-width:0.5;" width="192" x="326" y="86.5986"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="172" x="336" y="109.7305">Start with the data question</text></g><!--entity Q1--><g id="elem_Q1"><rect fill="#F7F9FB" height="52.1973" rx="6" ry="6" style="stroke:#333333;stroke-width:0.5;" width="209" x="317.5" y="226.0986"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="189" x="327.5" y="249.2305">1. Which business information</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="109" x="327.5" y="265.3291">concepts matter?</text></g><!--entity Q2--><g id="elem_Q2"><rect fill="#F7F9FB" height="52.1973" rx="6" ry="6" style="stroke:#333333;stroke-width:0.5;" width="280" x="282" y="338.0986"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="260" x="292" y="361.2305">2. What precise, technology-independent</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="135" x="292" y="377.3291">structure is required?</text></g><!--entity Q3--><g id="elem_Q3"><rect fill="#F7F9FB" height="52.1973" rx="6" ry="6" style="stroke:#333333;stroke-width:0.5;" width="204" x="320" y="450.0986"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="184" x="330" y="473.2305">3. How will the data be stored</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="154" x="330" y="489.3291">in a chosen technology?</text></g><!--entity Q4--><g id="elem_Q4"><rect fill="#F7F9FB" height="52.1973" rx="6" ry="6" style="stroke:#333333;stroke-width:0.5;" width="187" x="328.5" y="562.0986"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="167" x="338.5" y="585.2305">4. Where does data move,</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="124" x="338.5" y="601.3291">transform and rest?</text></g><!--entity Q5--><g id="elem_Q5"><rect fill="#F7F9FB" height="52.1973" rx="6" ry="6" style="stroke:#333333;stroke-width:0.5;" width="271" x="286.5" y="674.0986"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="251" x="296.5" y="697.2305">5. Where did a value originate, how was</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="225" x="296.5" y="713.3291">it transformed and where is it used?</text></g><!--entity Q6--><g id="elem_Q6"><rect fill="#F7F9FB" height="52.1973" rx="6" ry="6" style="stroke:#333333;stroke-width:0.5;" width="192" x="326" y="786.0986"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="168" x="336" y="809.2305">6. Who is accountable and</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="172" x="336" y="825.3291">who performs stewardship?</text></g><!--entity Q7--><g id="elem_Q7"><rect fill="#F7F9FB" height="52.1973" rx="6" ry="6" style="stroke:#333333;stroke-width:0.5;" width="221" x="311.5" y="898.0986"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="195" x="321.5" y="921.2305">7. What happens from creation</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="201" x="321.5" y="937.3291">through retention and disposal?</text></g><!--entity Q8--><g id="elem_Q8"><rect fill="#F7F9FB" height="52.1973" rx="6" ry="6" style="stroke:#333333;stroke-width:0.5;" width="274" x="285" y="1010.0986"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="254" x="295" y="1033.2305">8. Which shared subjects, classifications</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="221" x="295" y="1049.3291">or controlled values are governed?</text></g><!--entity CLARIFY--><g id="elem_CLARIFY"><rect fill="#FFF8DC" height="52.1973" rx="6" ry="6" style="stroke:#333333;stroke-width:0.5;" width="180" x="332" y="1122.0986"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="160" x="342" y="1145.2305">Clarify the data boundary</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="159" x="342" y="1161.3291">and architecture decision</text></g><!--entity V1--><g id="elem_V1"><rect fill="#EAF4EA" height="52.1973" rx="6" ry="6" style="stroke:#333333;stroke-width:0.5;" width="121" x="616.5" y="226.0986"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="72" x="626.5" y="249.2305">Conceptual</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="101" x="626.5" y="265.3291">information view</text></g><!--entity V2--><g id="elem_V2"><rect fill="#EAF4EA" height="36.0986" rx="6" ry="6" style="stroke:#333333;stroke-width:0.5;" width="98" x="652" y="346.0986"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="78" x="662" y="369.2305">Logical ERD</text></g><!--entity V3--><g id="elem_V3"><rect fill="#EAF4EA" height="52.1973" rx="6" ry="6" style="stroke:#333333;stroke-width:0.5;" width="90" x="614" y="4