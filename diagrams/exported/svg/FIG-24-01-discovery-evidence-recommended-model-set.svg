<?xml version="1.0" encoding="us-ascii" standalone="no"?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="565px" preserveAspectRatio="none" style="width:718px;height:565px;background:#FFFFFF;" version="1.1" viewBox="0 0 718 565" width="718px" zoomAndPan="magnify"><defs/><g><text fill="#000000" font-family="Arial" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="428" x="138.25" y="23.1318">FIG-24-01. Discovery Evidence and Recommended Model Set</text><!--entity Start--><g id="elem_Start"><rect fill="#DCEAF7" height="52.1973" rx="5" ry="5" style="stroke:#333333;stroke-width:0.5;" width="185" x="30.5" y="44.0986"/><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="165" x="40.5" y="67.2305">Problem, desired outcome</text><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="145" x="40.5" y="83.3291">and available evidence</text></g><!--entity Views--><g id="elem_Views"><rect fill="#F5F7FA" height="132.6904" rx="5" ry="5" style="stroke:#333333;stroke-width:0.5;" width="577" x="135.5" y="142.0986"/><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="157" x="145.5" y="165.2305">Focused discovery views</text><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="4" x="145.5" y="181.3291">&#160;</text><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="327" x="145.5" y="197.4277">Who matters?  maps to  Stakeholders and concerns</text><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="350" x="145.5" y="213.5264">What surrounds scope?  maps to  Current-state context</text><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="349" x="145.5" y="229.625">Which abilities matter?  maps to  Capability assessment</text><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="335" x="145.5" y="245.7236">How does work happen?  maps to  Process discovery</text><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="557" x="145.5" y="261.8223">What limits confidence or choice?  maps to  Constraints, assumptions and dependencies</text></g><!--entity Synth--><g id="elem_Synth"><rect fill="#E2F0D9" height="52.1973" rx="5" ry="5" style="stroke:#333333;stroke-width:0.5;" width="177" x="220.5" y="321.0986"/><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="157" x="230.5" y="344.2305">Synthesis: findings, gaps</text><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="155" x="230.5" y="360.3291">and candidate directions</text></g><!--entity Gate--><g id="elem_Gate"><rect fill="#FFF2CC" height="68.2959" rx="5" ry="5" style="stroke:#333333;stroke-width:0.5;" width="162" x="42" y="419.0986"/><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="127" x="52" y="442.2305">Readiness decision:</text><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="142" x="52" y="458.3291">proceed, loop, narrow,</text><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="87" x="52" y="474.4277">pause or stop</text></g><g id="elem_GMN11"><path d="M6,516.0986 L6,558.2959 A0,0 0 0 0 6,558.2959 L240,558.2959 A0,0 0 0 0 240,558.2959 L240,526.0986 L230,516.0986 L127,516.0986 L123,487.4486 L119,516.0986 L6,516.0986 A0,0 0 0 0 6,516.0986 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M230,516.0986 L230,526.0986 L240,526.0986 L230,516.0986 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="205" x="12" y="534.2305">This is an iterative learning loop,</text><text 