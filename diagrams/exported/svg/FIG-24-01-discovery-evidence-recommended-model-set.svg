<?xml version="1.0" encoding="us-ascii" standalone="no"?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="496px" preserveAspectRatio="none" style="width:1521px;height:496px;background:#FFFFFF;" version="1.1" viewBox="0 0 1521 496" width="1521px" zoomAndPan="magnify"><defs/><g><text fill="#000000" font-family="Arial" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="428" x="539.5" y="23.1318">FIG-24-01. Discovery Evidence and Recommended Model Set</text><!--entity Start--><g id="elem_Start"><rect fill="#DCEAF7" height="52.1973" rx="5" ry="5" style="stroke:#333333;stroke-width:0.5;" width="185" x="7" y="222.5654"/><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="165" x="17" y="245.6973">Problem, desired outcome</text><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="145" x="17" y="261.7959">and available evidence</text></g><!--entity Stake--><g id="elem_Stake"><rect fill="#F5F7FA" height="52.1973" rx="5" ry="5" style="stroke:#333333;stroke-width:0.5;" width="106" x="501.5" y="90.5654"/><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="83" x="511.5" y="113.6973">Stakeholders</text><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="86" x="511.5" y="129.7959">and concerns</text></g><!--entity Context--><g id="elem_Context"><rect fill="#F5F7FA" height="52.1973" rx="5" ry="5" style="stroke:#333333;stroke-width:0.5;" width="104" x="502.5" y="177.5654"/><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="84" x="512.5" y="200.6973">Current-state</text><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="45" x="512.5" y="216.7959">context</text></g><!--entity Cap--><g id="elem_Cap"><rect fill="#F5F7FA" height="52.1973" rx="5" ry="5" style="stroke:#33333