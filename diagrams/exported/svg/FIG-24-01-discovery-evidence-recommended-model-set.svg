<?xml version="1.0" encoding="us-ascii" standalone="no"?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="711.9px" preserveAspectRatio="none" style="width:725px;height:711px;background:#FFFFFF;" version="1.1" viewBox="0 0 725 711" width="725.4px" zoomAndPan="magnify"><defs/><g><text fill="#000000" font-family="Arial" font-size="12.6" font-weight="bold" lengthAdjust="spacing" textLength="385.2" x="163.8" y="20.8187">FIG-24-01. Discovery Evidence and Recommended Model Set</text><!--entity Start--><g id="elem_Start"><rect fill="#DCEAF7" height="46.9775" rx="4.5" ry="4.5" style="stroke:#333333;stroke-width:0.45;" width="166.5" x="427.05" y="39.6888"/><text fill="#111111" font-family="Arial" font-size="12.6" lengthAdjust="spacing" textLength="148.5" x="436.05" y="60.5074">Problem, desired outcome</text><text fill="#111111" font-family="Arial" font-size="12.6" lengthAdjust="spacing" textLength="130.5" x="436.05" y="74.9962">and available evidence</text></g><!--entity Stake--><g id="elem_Stake"><rect fill="#F5F7FA" height="46.9775" rx="4.5" ry="4.5" style="stroke:#333333;stroke-width:0.45;" width="173.7" x="293.85" y="112.5888"/><text fill="#111111" font-family="Arial" font-size="12.6" lengthAdjust="spacing" textLength="79.2" x="302.85" y="133.4074">Who matters?</text><text fill="#111111" font-family="Arial" font-size="12.6" lengthAdjust="spacing" textLength="155.7" x="302.85" y="147.8962">Stakeholders and concerns</text></g><!--entity Context--><g id="elem_Context"><rect fill="#F5F7FA" height="46.9775" rx="4.5" ry="4.5" style="stroke:#333333;stroke-width:0.45;" width="153.9" x="347.85" y="185.4888"/><text fill="#111111" font-family="Arial" font-size="12.6" lengthAdjust="spacing" textLength="135.9" x="356.85" y="206.3074">What surrounds scope?</text><text fill="#111111" font-family="Arial" font-size="12.6" lengthAdjust="spacing" textLength="119.7" x="356.85" y="220.7962">Current-state context</text></g><!--entity Cap--><g id="elem_Cap"><rect fill="#F5F7FA" height="46.9775" rx="4.5" ry="4.5" style="stroke:#333333;stroke-width:0.45;" width="145.8" x="386.1" y="258.3888"/><text fill="#111111" font-family="Arial" font-size="12.6" lengthAdjust="spacing" textLength="127.8" x="395.1" y="279.2074">Which abilities matter?</text><text fill="#111111" font-family="Arial" font-size="12.6" lengthAdjust="spacing" textLength="126.9" x="395.1" y="293.6962">Capability assessment</text></g><!--entity Process--><g id="elem_Process"><rect fill="#F5F7FA" height="46.9775" rx="4.5" ry="4.5" style="stroke:#333333;stroke-width:0.45;" width="156.6" x="415.8" y="346.5888"/><text fill="#111111" font-family="Arial" font-size="12.6" lengthAdjust="spacing" textLength="138.6" x="424.8" y="367.4074">How does work happen?</text><text fill="#111111" font-family="Arial" font-size="12.6" lengthAdjust="spacing" textLength="103.5" x="424.8" y="381.8962">Process discovery</text></g><!--entity Limits--><g id="elem_Limits"><rect fill="#F5F7FA" height="46.9775" rx="4.5" ry="4.5" style="stroke:#333333;stroke-width:0.45;" width="270" x="450" y="419.4888"/><text fill="#111111" font-family="Arial" font-size="12.6" lengthAdjust="spacing" textLength="189.9" x="459" y="440.3074">What limits confidence or choice?</text><text fill="#111111" font-family="Arial" font-size="12.6" lengthAdjust="spacing" textLength="252" x="459" y="454.7962">Constraints, assumptions and dependencies</text></g><!--entity Synth--><g id="elem_Synth"><rect fill="#E2F0D9" height="46.9775" rx="4.5" ry="4.5" style="stroke:#333333;stroke-width:0.45;" width="159.3" x="293.85" y="492.3888"/><text fill="#111111" font-family="Arial" font-size="12.6" lengthAdjust="spacing" textLength="141.3" x="302.85" y="513.2074">Synthesis: findings, gaps</text><text fill="#111111" font-family="Arial" font-size="12.6" lengthAdjust="spacing" textLength="139.5" x="302.85" y="527.6962">and candidate directions</text></g><!--entity Gate--><g id="elem_Gate"><rect fill="#FFF2CC" height="61.4663" rx="4.5" ry="4.5" style="stroke:#333333;stroke-width:0.45;" width="145.8" x="37.8" y="580.5888"/><text fill="#111111" font-family="Arial" font-size="12.6" lengthAdjust="spacing" textLength="114.3" x="46.8" y="601.4074">Readiness decision:</text><text fill="#111111" font-family="Arial" font-size="12.6" lengthAdjust="spacing" textLength="127.8" x="46.8" y="615.8962">proceed, loop, narrow,</text><text fill="#111111" font-family="Arial" font-size="12.6" lengthAdjust="spacing" textLength="78.3" x="46.8" y="630.385">pause or stop</text></g><g id="elem_GMN27"><path d="M5.4,667.8888 L5.4,705.8663 A0,0 0 0 0 5.4,705.8663 L216,705.8663 A0,0 0 0 0 216,705.8663 L216,676.8888 L207,667.8888 L114.3,667.8888 L110.7,642.1038 L107.1,667.8888 L5.4,667.8888 A0,0 0 0 0 5.4,667.8888 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.45;"/><path d="M207,667.8888 L207,676.8888 L216,676.8888 L207,667.8888 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.45;"/><text fill="#000000" font-family="Arial" font-size="12.6" lengthAdjust="spacing" textLength="184.5" x="10.8" y="684.2074">This is an iterative learning loop,</text><text fill="#000000" font-family="Arial" font-size="12.6" lengthAdjust="spacing" textLength="191.7" x="10.8" y="698.6962">not one mandatory linear method.</text></g><!--link Start to Stake--><g id="link_Start_Stake"><path d="M468.936,86.6778 C453.978,94.8858 441.8185,101.557 426.8515,109.774 " fill="none" id="Start-to-Stake" style="stroke:#333333;stroke-width:0.9;"/><polygon fill="#333333" points="422.118,112.3728,430.9508,111.6303,426.0626,110.2071,427.4858,105.3189,422.118,112.3728" style="stroke:#333333;stroke-width:0.9;"/></g><!--link Start to Context--><g id="link_Start_Context"><path d="M505.395,86.5518 C500.283,106.7838 490.914,136.6998 476.1,159.3888 C469.926,168.8388 465.5378,174.1085 457.3568,181.6775 " fill="none" id="Start-to-Context" style="stroke:#333333;stroke-width:0.9;"/><polygon fill="#333333" points="453.393,185.3448,461.78