 fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="142" x="1326" y="93.7959">proceed, loop, narrow,</text><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="87" x="1326" y="109.8945">pause or stop</text></g><g id="elem_GMN23"><path d="M1280,157.5654 L1280,199.7627 A0,0 0 0 0 1280,199.7627 L1514,199.7627 A0,0 0 0 0 1514,199.7627 L1514,167.5654 L1504,157.5654 L1401,157.5654 L1397,122.7454 L1393,157.5654 L1280,157.5654 A0,0 0 0 0 1280,157.5654 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1504,157.5654 L1504,167.5654 L1514,167.5654 L1504,157.5654 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="205" x="1286" y="175.6973">This is an iterative learning loop,</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="213" x="1286" y="191.7959">not one mandatory linear method.</text></g><!--link Start to Stake--><g id="link_Start_Stake"><path d="M148.51,222.5654 C170.44,211.4954 197.03,199.1854 222,190.5654 C318.15,157.3654 429.3191,136.2766 495.4691,125.4266 " fill="none" id="Start-to-Stake" style="stroke:#333333;stroke-width:1.0;"/><polygon fill="#333333" points="501.39,124.4554,491.8612,121.9649,496.4559,125.2647,493.1561,129.8594,501.39,124.4554" style="stroke:#333333;stroke-width:1.0;"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="88" x="284.5" y="133.6973">Who matters?</text></g><!--link Start to Context--><g id="link_Start_Context"><path d="M192.17,239.4554 C285.63,230.1754 421.2694,216.6987 496.4494,209.2287 " fill="none" id="Start-to-Context" style="stroke:#333333;stroke-width:1.0;"/><polygon fill="#333333" points="502.42,208.6354,493.0686,205.5449,497.4445,209.1298,493.8596,213.5057,502.42,208.6354" style="stroke:#333333;stroke-width:1.0;"/><text fill="#000000" font-family="Arial" font