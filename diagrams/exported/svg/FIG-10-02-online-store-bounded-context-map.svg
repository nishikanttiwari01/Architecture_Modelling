<?xml version="1.0" encoding="us-ascii" standalone="no"?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="750px" preserveAspectRatio="none" style="width:720px;height:750px;background:#FFFFFF;" version="1.1" viewBox="0 0 720 750" width="720px" zoomAndPan="magnify"><defs/><g><text fill="#000000" font-family="Arial" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="323" x="191.5" y="23.1318">FIG-10-02. Online Store Bounded Context Map</text><!--entity Catalogue--><g id="elem_Catalogue"><rect fill="#EAF6E8" height="84.3945" rx="2.5" ry="2.5" style="stroke:#333333;stroke-width:0.5;" width="137" x="291.5" y="44.0986"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="117" x="301.5" y="67.2305">Catalogue Context</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="76" x="301.5" y="83.3291">&#171;Upstream&#187;</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="92" x="301.5" y="99.4277">Product, price,</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="65" x="301.5" y="115.5264">availability</text></g><!--entity Ordering--><g id="elem_Ordering"><rect fill="#FFFFFF" height="84.3945" rx="2.5" ry="2.5" style="stroke:#333333;stroke-width:0.5;" width="199" x="260.5" y="198.0986"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="108" x="270.5" y="221.2305">Ordering Context</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="179" x="270.5" y="237.3291">&#171;Downstream of Catalogue&#187;</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="89" x="270.5" y="253.4277">Basket, order,</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="60" x="270.5" y="269.5264">order line</text></g><!--entity Payment--><g id="elem_Payment"><rect fill="#F7F9FB" height="84.3945" rx="2.5" ry="2.5" style="stroke:#333333;stroke-width:0.5;" width="164" x="16" y="198.0986"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="107" x="26" y="221.2305">Payment Context</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="144" x="26" y="237.3291">&#171;Supplier to Ordering&#187;</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="110" x="26" y="253.4277">Payment attempt,</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="82" x="26" y="269.5264">authorisation</text></g><!--entity Fulfilment--><g id="elem_Fulfilment"><rect fill="#F7F9FB" height="84.3945" rx="2.5" ry="2.5" style="stroke:#333333;stroke-width:0.5;" width="164" x="540" y="198.0986"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="113" x="550" y="221.2305">Fulfilment Context</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="144" x="550" y="237.3291">&#171;Supplier to Ordering&#187;</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="63" x="550" y="253.4277">Shipment,</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="91" x="550" y="269.5264">delivery status</text></g><!--entity Support--><g id="elem_Support"><rect fill="#FFFFFF" height="84.3945" rx="2.5" ry="2.5" style="stroke:#333333;stroke-width:0.5;" width="168" x="276" y="352.0986"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="102" x="286" y="375.2305">Support Context</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="94" x="286" y="391.3291">&#171;Downstream&#187;</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="148" x="286" y="407.4277">Return, refund request,</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="30" x="286" y="423.5264">case</text></g><!--entity PayProvider--><g id="elem_PayProvider"><rect fill="#F2F5F7" height="52.1973" rx="2.5" ry="2.5" style="stroke:#333333;stroke-width:0.5;" width="182" x="7" y="506.0986"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="162" x="17" y="529.2305">Payment Provider System</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="115" x="17" y="545.3291">&#171;External system&#187;</text></g><!--entity DeliveryPartner--><g id="elem_DeliveryPartner"><rect fill="#F2F5F7" height="52.1973" rx="2.5" ry="2.5" style="stroke:#333333;stroke-width:0.5;" width="172" x="542" y="506.0986"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="152" x="552" y="529.2305">Delivery Partner System</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="115" x="552" y="545.3291">&#171;External system&#187;</text></g><!--entity PayACL--><g id="elem_PayACL"><rect fill="#FFF4D6" height="52.1973" rx="2.5" ry="2.5" style="stroke:#333333;stroke-width:0.5;" width="172" x="12" y="368.0986"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="143" x="22" y="391.2305">Payment Provider ACL</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="152" x="22" y="407.3291">&#171;Anti-Corruption Layer&#187;</text></g><!--entity DeliveryACL--><g id="elem_DeliveryACL"><rect fill="#FFF4D6" height="52.1973" rx="2.5" ry="2.5" style="stroke:#333333;stroke-width:0.5;" width="172" x="542" y="368.0986"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="133" x="552" y="391.2305">Delivery Partner ACL</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="152" x="552" y="407.3291">&#171;Anti-Corruption Layer&#187;</text></g><!--link Catalogue to Ordering--><g id="link_Catalogue_Ordering"><path d="M360,128.1786 C360,149.9086 360,170.3486 360,192.0686 " fill="none" id="Catalogue-to-Ordering" style="stroke:#333333;stroke-width:1.2;"/><polygon fill="#333333" points="360,198.0686,364,189.0686,360,193.0686,356,189.0686,360,198.0686" style="stroke:#333333;stroke-width:1.2;"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="18" x="341" y="159.2605">R1</text></g><!--reverse link Payment to Ordering--><g id="link_Payment_Ordering"><path d="M186.18,254.0986 C211.54,254.0986 233.75,254.0986 260.17,254.0986 " fill="none" id="Payment-backto-Ordering" style="stroke:#333333;stroke-width:1.2;"/><polygon fill="#333333" points="180.18,254.0986,189.18,258.0986,185.18,254.0986,189.18,250.0986,180.18,254.0986" style="stroke:#333333;stroke-width:1.2;"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="18" x="201.17" y="250.2305">R2</text></g><!--link Payment to Ordering--><g id="link_Payment_Ordering"><path d="M180.18,226.0986 C205.54,226.0986 227.75,226.0986 254.17,226.0986 " fill="none" id="Payment-to-Ordering" style="stroke:#333333;stroke-width:1.2;"/><polygon fill="#333333" points="260.17,226.0986,251.17,222.0986,255.17,226.0986,251.17,230.0986,260.17,226.0986" style="stroke:#333333;stroke-width:1.2;"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="18" x="201.17" y="222.2305">R3</text></g><!--link Ordering to Fulfilment--><g id="link_Ordering_Fulfilment"><path d="M459.8,226.0986 C486.26,226.0986 508.53,226.0986 533.93,226.0986 " fill="none" id="Ordering-to-Fulfilment" style="stroke:#333333;stroke-width:1.2;"/><polygon fill="#333333" points="539.93,226.0986,530.93,222.0986,534.93,226.0986,530.93,230.0986,539.93,226.0986" style="stroke:#333333;stroke-width:1.2;"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="18" x="480.86" y="222.2305">R4</text></g><!--reverse link Ordering to Fulfilment--><g id="link_Ordering_Fulfilment"><path d="M465.8,254.0986 C492.26,254.0986 514.53,254.0986 539.93,254.0986 " fill="none" id="Ordering-backto-Fulfilment" style="stroke:#333333;stroke-width:1.2;"/><polygon fill="#333333" points="459.8,254.0986,468.8,258.0986,464.8,254.0986,468.8,250.0986,459.8,254.0986" style="stroke:#333333;stroke-width:1.2;"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="18" x="480.86" y="250.2305">R5</text></g><!--reverse link Ordering to Support--><g id="link_Ordering_Support"><path d="M388,288.1786 C388,309.9086 388,330.3486 388,352.0686 " fill="none" id="Ordering-backto-Support" style="stroke:#333333;stroke-width:1.2;"/><polygon fill="#333333" points="388,282.1786,384,291.1786,388,287.1786,392,291.1786,388,282.1786" style="stroke:#333333;stroke-width:1.2;"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="18" x="369" y="313.2605">R6</text></g><!--reverse link Fulfilment to Support--><g id="link_Fulfilment_Support"><path d="M596,288.4086 C596,322.9586 596,360.0986 596,360.0986 C596,360.0986 511.98,360.0986 444.2,360.0986 " fill="none" id="Fulfilment-backto-Support" style="stroke:#333333;stroke-width:1.2;"/><polygon fill="#333333" points="596,282.4086,592,291.4086,596,287.4086,600,291.4086,596,282.4086" style="stroke:#333333;stroke-width:1.2;"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="18" x="539.95" y="356.2305">R7</text></g><!--link Support to Support--><g id="link_Support_Support"><path d="M332,351.9986 C332,334.0186 332,317.0986 332,317.0986 C332,317.0986 268.25,317.0986 268.25,317.0986 C268.25,317.0986 268.25,471.0986 268.25,471.0986 C268.25,471.0986 360,471.0986 360,471.0986 C360,471.0986 360,460.1786 360,442.1986 " fill="none" id="Support-to-Support" style="stroke:#333333;stroke-width:1.2;stroke-dasharray:7.0,7.0;"/><polygon fill="#333333" points="360,436.1986,356,445.1986,360,441.1986,364,445.1986,360,436.1986" style="stroke:#333333;stroke-width:1.2;"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="18" x="244.25" y="399.2305">R8</text></g><!--link Payment to PayACL--><g id="link_Payment_PayACL"><path d="M98,282.1786 C98,309.6086 98,338.5386 98,362.0186 " fill="none" id="Payment-to-PayACL" style="stroke:#333333;stroke-width:1.2;"/><polygon fill="#333333" points="98,368.0186,102,359.0186,98,363.0186,94,359.0186,98,368.0186" style="stroke:#333333;stroke-width:1.2;"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="27" x="70" y="321.2305">ACL</text></g><!--link PayACL to PayProvider--><g id="link_PayACL_PayProvider"><path d="M98,420.3786 C98,444.9386 98,475.3886 98,499.9186 " fill="none" id="PayACL-to-PayProvider" style="stroke:#333333;stroke-width:1.2;"/><polygon fill="#333333" points="98,505.9186,102,496.9186,98,500.9186,94,496.9186,98,505.9186" style="stroke:#333333;stroke-width:1.2;"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="55" x="42" y="459.2805">translate</text></g><!--link Fulfilment to DeliveryACL--><g id="link_Fulfilment_DeliveryACL"><path d="M650,282.1786 C650,309.6086 650,338.5386 650,362.0186 " fill="none" id="Fulfilment-to-DeliveryACL" style="stroke:#333333;stroke-width:1.2;"/><polygon fill="#333333" points="650,368.0186,654,359.0186,650,363.0186,646,359.0186,650,368.0186" style="stroke:#333333;stroke-width:1.2;"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="27" x="622" y="321.2305">ACL</text></g><!--link DeliveryACL to DeliveryPartner--><g id="link_DeliveryACL_DeliveryPartner"><path d="M628,420.3786 C628,444.9386 628,475.3886 628,499.9186 " fill="none" id="DeliveryACL-to-DeliveryPartner" style="stroke:#333333;stroke-width:1.2;"/><polygon fill="#333333" points="628,505.9186,632,496.9186,628,500.9186,624,496.9186,628,505.9186" style="stroke:#333333;stroke-width:1.2;"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="55" x="572" y="459.2805">translate</text></g><rect fill="none" height="154.8877" id="_legend" rx="7.5" ry="7.5" style="stroke:#000000;stroke-width:1.0;" width="593" x="56.5" y="575.2959"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="219" x="61.5" y="593.4277">Context map, not deployment view.</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="583" x="61.5" y="609.5264">R1 Catalogue upstream -&gt; Ordering downstream: Open Host Service + Published Language.</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="427" x="61.5" y="625.625">R2 Ordering -&gt; Payment: Customer/Supplier payment authorisation.</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="427" x="61.5" y="641.7236">R3 Payment -&gt; Ordering: Published Language, PaymentAuthorised.</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="401" x="61.5" y="657.8223">R4 Ordering -&gt; Fulfilment: Customer/Supplier fulfilment request.</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="409" x="61.5" y="673.9209">R5 Fulfilment -&gt; Ordering: Published Language, shipment status.</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="465" x="61.5" y="690.0195">R6/R7 Support is Conformist to selected order and shipment status terms.</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="375" x="61.5" y="706.1182">R8 Support uses Separate Ways for internal case handling.</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="557" x="61.5" y="722.2168">ACL means Anti-Corruption Layer and marks translation boundaries to external systems.</text><!--SRC=[ZLLTR-is37tNh-1k7nUd7xTjkk0YG9lMsu0EBHeCU-cB6ZE9K5dI93htvj-FSYnRpOAjGG1R8daEHLB7Focpr4s5C1wVyZ_GJcCuTLeQQcfTq0Ph73j-5OAi0xBmPebi3PNok2HbZI156g7y_TVY_AmuknZ3az7A82p8UeGxsvWAAvXRG_Y3u0_fX0ZloZZfPGtHatOEmNhQsCnWR8K17ToSPPjUclUuEJaJ8j9BisRgBtD9KjjrWudbrNpxzgSBv57MizchUVQsQfOq0kVL4aUlHcwbql9DQKMxBo03310d3xVbzSDDZl_aA_JAh7FuU_lTx0d0heRmo7OdmpiocOrXJDO-svEsL3tQITd-SgPdkQlHK4wqQ9pJYW6uzYcqFLFdAecmTXGFrN09lGeojgMbIZudvQJyfRpBcSf6hvJ-BDbYerpqPPOAjTgYtq4WIKreUJAm8rGHbDjxl7eH_GMfyMO47bSyBFpuky4GkPOox6kM85B9ZjMCcxnLiTABNU2IH9g77uJUI0sXtPhDKbLwtvFoehmg9pdUVJhWi_HaFe6N0fB_4Sn_vNWxVuo0juPKCRVUDous3Hxb3lsG9dkrHxwyl_xF33-1bc9oI35CVL5nHuhPC9nJU3aNebyM6bV4zdGGDb-8j2YyMc_e8Ffh7fqSia5XbqkHhHD3Zd4bHEfyqRW3u_M1xIFsfBUEnxD-VjXm8uQykqDtbPx6EefkaTdwfas1M862beGVCkzSynBliVATGw_KknnKQ5mZtu2znegacRLq8nP4WWgTjllSjmg_ZyNBUQPSJQTua1Ugwc_Q59uS6lZD1e85-Yqh8VmCpysRLc732lt8qzN8DJBgnH0_z7mAyoPmMkXFUvbmIOHowM60h_sWPBbCZv2DakDjXu0LXrz-u1zAVIo5rT28JZWOu2gVXlzD8NJgraaQnr-VlapweL4XIjVA-bfnwLWP0sg-Z0onLtR97Jk00DQ9EWBTz2XDGDOnZ1yoGlXBxW8m92ZJIKhKEjWm5dyercCHHwP67WmuUgjRqbhwzz2FJxIznQ-jz8gfE4_yA5US3m_NViJ-0G00]--></g></svg>