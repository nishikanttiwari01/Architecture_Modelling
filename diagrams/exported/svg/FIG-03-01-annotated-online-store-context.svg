<?xml version="1.0" encoding="us-ascii" standalone="no"?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="405px" preserveAspectRatio="none" style="width:935px;height:405px;background:#FFFFFF;" version="1.1" viewBox="0 0 935 405" width="935px" zoomAndPan="magnify"><defs/><g><text fill="#000000" font-family="Arial" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="352" x="284.5" y="23.1318">FIG-03-01. Annotated online store context diagram</text><!--entity customer--><g id="elem_customer"><rect fill="#F4F8FB" height="64.8462" rx="4" ry="4" style="stroke:#2B4D66;stroke-width:0.5;" width="76" x="7" y="109.0986"/><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="56" x="17" y="131.2925">Customer</text><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="4" x="17" y="146.2412">&#160;</text><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="41" x="17" y="161.1899">Person</text></g><!--entity support--><g id="elem_support"><rect fill="#F4F8FB" height="64.8462" rx="4" ry="4" style="stroke:#2B4D66;stroke-width:0.5;" width="163" x="158" y="44.0986"/><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="143" x="168" y="66.2925">Customer Support Agent</text><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="4" x="168" y="81.2412">&#160;</text><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="41" x="168" y="96.1899">Person</text></g><!--entity store--><g id="elem_store"><rect fill="#F4F8FB" height="79.7949" rx="4" ry="4" style="stroke:#2B4D66;stroke-width:0.5;" width="126" x="176.5" y="159.5986"/><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="106" x="186.5" y="181.7925">System boundary:</text><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="72" x="186.5" y="196.7412">Online Store</text><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="4" x="186.5" y="211.6899">&#160;</text><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="98" x="186.5" y="226.6387">System in scope</text></g><!--entity payment--><g id="elem_payment"><rect fill="#F4F8FB" height="64.8462" rx="4" ry="4" style="stroke:#2B4D66;stroke-width:0.5;" width="171" x="154" y="290.0986"/><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="151" x="164" y="312.2925">Payment Provider System</text><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="4" x="164" y="327.2412">&#160;</text><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="95" x="164" y="342.1899">External system</text></g><!--entity delivery--><g id="elem_delivery"><rect fill="#F4F8FB" height="64.8462" rx="4" ry="4" style="stroke:#2B4D66;stroke-width:0.5;" width="160" x="425" y="290.0986"/><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="140" x="435" y="312.2925">Delivery Partner System</text><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="4" x="435" y="327.2412">&#160;</text><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="95" x="435" y="342.1899">External system</text></g><!--entity relationships--><g id="elem_relationships"><rect fill="#FFF7D6" height="109.6924" rx="4" ry="4" style="stroke:#2B4D66;stroke-width:0.5;" width="218" x="396" y="144.5986"/><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="109" x="406" y="166.7925">Relationship labels</text><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="4" x="406" y="181.7412">&#160;</text><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="198" x="406" y="196.6899">A Browse, order and track delivery</text><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="102" x="406" y="211.6387">B Support returns</text><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="176" x="406" y="226.5874">C Authorise or refund payment</text><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="180" x="406" y="241.5361">D Delivery request and tracking</text></g><!--entity checks--><g id="elem_checks"><rect fill="#FFF7D6" height="139.5898" rx="4" ry="4" style="stroke:#2B4D66;stroke-width:0.5;" width="254" x="675" y="129.5986"/><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="93" x="685" y="151.7925">Reading checks</text><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="4" x="685" y="166.7412">&#160;</text><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="234" x="685" y="181.6899">1. Start with title, purpose and viewpoint.</text><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="162" x="685" y="196.6387">2. Find the scope boundary.</text><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="159" x="685" y="211.5874">3. Identify people and roles.</text><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="164" x="685" y="226.5361">4. Identify external systems.</text><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="200" x="685" y="241.4849">5. Read arrow labels and direction.</text><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="216" x="685" y="256.4336">6. State omissions and assumptions.</text></g><!--entity omissions--><g id="elem_omissions"><rect fill="#FFF7D6" height="94.7437" rx="4" ry="4" style="stroke:#2B4D66;stroke-width:0.5;" width="241" x="681.5" y="305.0986"/><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="121" x="691.5" y="327.2925">Deliberate omissions</text><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="4" x="691.5" y="342.2412">&#160;</text><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="221" x="691.5" y="357.1899">Internal components, database tables,</text><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="176" x="691.5" y="372.1387">cloud deployment and detailed</text><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="161" x="691.5" y="387.0874">process flow are not shown.</text></g><!--link customer to support--><!--link payment to delivery--><!--link customer to store--><!--link customer to store--><g id="link_customer_store"><path d="M83.12,152.7786 C109.56,160.7486 139.9653,169.9072 170.7553,179.1872 " fill="none" id="customer-to-store-1" style="stroke:#555555;stroke-width:1.0;"/><polygon fill="#555555" points="176.5,180.9186,169.0372,174.4916,171.7127,179.4758,166.7286,182.1513,176.5,180.9186" style="stroke:#555555;stroke-width:1.0;"/><text fill="#333333" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="9" x="114" y="159.7925">A</text></g><!--link store to payment--><!--link store to payment--><g id="link_store_payment"><path d="M239.5,239.8686 C239.5,256.0986 239.5,268.5886 239.5,283.9586 " fill="none" id="store-to-payment-1" style="stroke:#555555;stroke-width:1.0;"/><polygon fill="#555555" points="239.5,289.9586,243.5,280.9586,239.5,284.9586,235.5,280.9586,239.5,289.9586" style="stroke:#555555;stroke-width:1.0;"/><text fill="#333333" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="9" x="224" y="270.0425">C</text></g><!--link support to store--><g id="link_support_store"><path d="M239.5,109.1786 C239.5,124.5586 239.5,137.0686 239.5,153.3286 " fill="none" id="support-to-store" style="stroke:#555555;stroke-width:1.0;"/><polygon fill="#555555" points="239.5,159.3286,243.5,150.3286,239.5,154.3286,235.5,150.3286,239.5,159.3286" style="stroke:#555555;stroke-width:1.0;"/><text fill="#333333" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="9" x="224" y="139.5425">B</text></g><!--link store to delivery--><g id="link_store_delivery"><path d="M302.85,228.8686 C346.11,249.1786 396,272.5986 396,272.5986 C396,272.5986 407.7056,278.0171 428.3256,287.5671 " fill="none" id="store-to-delivery" style="stroke:#555555;stroke-width:1.0;"/><polygon fill="#555555" points="433.77,290.0886,427.2844,282.6767,429.233,287.9873,423.9223,289.9359,433.77,290.0886" style="stroke:#555555;stroke-width:1.0;"/><text fill="#333333" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="9" x="356" y="251.7925">D</text></g><!--link store to relationships--><!--link relationships to checks--><!--link checks to omissions--><!--SRC=[XLLDSzem4BtxL-oaLs12I6WcXyxOK3gvj4murZq8Uy6Qo98goI6qq__UbMmSsv29Bi0-xTktNy9n9n1MZz_6rxFnzNG2iPJACOSvA2cuHB1E6OHCIOUl3dBEzeQLKMIVkTICle8jMAuENEvXnuJ53fBZZbN2hSZtEoiHOiEPk8nl-1-4wQm36imSatjIzpS2I5Zsl3Ugalb22MNWq-fsTRzAFA9CZgQntYIto_cSh9wpiKt38TjJxMua6hYF_dLYQM9d-_SYXJECT9VCay_nnKXTPYhc-xIVb_CXxNqyNqwN7z8oOzGXy9xaXDFtcuNJy_CTTKUDe9Ku-XzH973dm2amV5_u_lgwSoMZwAq1LukAfg14ayfKhj5O9Q-0MSWQywMhiAcqLiP1l4Vf1ewsndenDaVhi8IjBn4pnuTK_gW7SEC7q1CqDxW4cocDDPC7UpnhTYmf8goDUk6v5nBSFC7NLuT6CW4sc0A1hgzt6POe-0kQ8woPSV93Xhov7aMdUi3uPy7p7EKlMWmv_jBcsmGxmrkASuRG5ayH4gsNyGmy9T7nx_d10yHH8-8SIawq0pg25aFef9ImPQ_iJoYOdnjRS0s2RL5ONx0O4ffKYoC8KmvCvk0CxKBBbCgadHM3hZAI71SGLwvGXbiaHxBlQ2fEkbAvXBP71dzNQDqRCJr4eIsc8yYswzQNp7B_R6K5Piz1BRr_6qTDXmDt1JZ_Dev0LqOhqk4Zl70yQCMbcwJoPW8hxgCMM0zaExi4pYRmI1roV7S4ZKgBsjyeWPRWsmwC_PdoyDq4lBXcpUjg1lzsFUdIF8YbvqMLt5gVQRZ2hAr