<?xml version="1.0" encoding="us-ascii" standalone="no"?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="453px" preserveAspectRatio="none" style="width:934px;height:453px;background:#FFFFFF;" version="1.1" viewBox="0 0 934 453" width="934px" zoomAndPan="magnify"><defs/><g><text fill="#000000" font-family="Arial" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="352" x="284" y="23.1318">FIG-03-01. Annotated online store context diagram</text><!--entity customer--><g id="elem_customer"><rect fill="#F4F8FB" height="64.8462" rx="4" ry="4" style="stroke:#2B4D66;stroke-width:0.5;" width="76" x="72.5" y="179.5986"/><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="56" x="82.5" y="201.7925">Customer</text><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="4" x="82.5" y="216.7412">&#160;</text><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="41" x="82.5" y="231.6899">Person</text></g><!--entity support--><g id="elem_support"><rect fill="#F4F8FB" height="64.8462" rx="4" ry="4" style="stroke:#2B4D66;stroke-width:0.5;" width="163" x="364" y="106.5986"/><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="143" x="374" y="128.7925">Customer Support Agent</text><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="4" x="374" y="143.7412">&#160;</text><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="41" x="374" y="158.6899">Person</text></g><!--entity purpose--><g id="elem_purpose"><rect fill="#FFF7D6" height="64.8462" rx="4" ry="4" style="stroke:#2B4D66;stroke-width:0.5;" width="207" x="7" y="279.5986"/><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="187" x="17" y="301.7925">Purpose: Identify system scope,</text><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="170" x="17" y="316.7412">users, external dependencies</text><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="102" x="17" y="331.6899">and relationships.</text></g><!--entity store--><g id="elem_store"><rect fill="#F4F8FB" height="79.7949" rx="4" ry="4" style="stroke:#2B4D66;stroke-width:0.5;" width="126" x="382.5" y="237.0986"/><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="106" x="392.5" y="259.2925">System boundary:</text><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="72" x="392.5" y="274.2412">Online Store</text><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="4" x="392.5" y="289.1899">&#160;</text><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="98" x="392.5" y="304.1387">System in scope</text></g><!--entity payment--><g id="elem_payment"><rect fill="#F4F8FB" height="64.8462" rx="4" ry="4" style="stroke:#2B4D66;stroke-width:0.5;" width="171" x="360" y="382.5986"/><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="151" x="370" y="404.7925">Payment Provider System</text><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="4" x="370" y="419.7412">&#160;</text><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="95" x="370" y="434.6899">External system</text></g><!--entity delivery--><g id="elem_delivery"><rect fill="#F4F8FB" height="64.8462" rx="4" ry="4" style="stroke:#2B4D66;stroke-width:0.5;" width="160" x="720.5" y="349.5986"/><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="140" x="730.5" y="371.7925">Delivery Partner System</text><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="4" x="730.5" y="386.7412">&#160;</text><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="95" x="730.5" y="401.6899">External system</text></g><!--entity checks--><g id="elem_checks"><rect fill="#FFF7D6" height="139.5898" rx="4" ry="4" style="stroke:#2B4D66;stroke-width:0.5;" width="254" x="673.5" y="44.0986"/><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="93" x="683.5" y="66.2925">Reading checks</text><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="4" x="683.5" y="81.2412">&#160;</text><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="234" x="683.5" y="96.1899">1. Start with title, purpose and viewpoint.</text><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="162" x="683.5" y="111.1387">2. Find the scope boundary.</text><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="159" x="683.5" y="126.0874">3. Identify people and roles.</text><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="164" x="683.5" y="141.0361">4. Identify external systems.</text><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="200" x="683.5" y="155.9849">5. Read arrow labels and direction.</text><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="216" x="683.5" y="170.9336">6. State omissions and assumptions.</text></g><!--entity omissions--><g id="elem_omissions"><rect fill="#FFF7D6" height="94.7437" rx="4" ry="4" style="stroke:#2B4D66;stroke-width:0.5;" width="255" x="673" y="219.5986"/><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="121" x="683" y="241.7925">Deliberate omissions</text><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="4" x="683" y="256.7412">&#160;</text><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="221" x="683" y="271.6899">Internal components, database tables,</text><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="224" x="683" y="286.6387">cloud deployment, payment responses</text><text fill="#111111" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="235" x="683" y="301.5874">and detailed process flow are not shown.</text></g><!--link customer to support--><!--link payment to delivery--><!--link customer to store--><!--link customer to store--><g id="link_customer_store"><path d="M148.57,218.8886 C210.9,230.2986 330,252.0986 330,252.0986 C330,252.0986 349.508,256.3593 376.358,262.2193 " fill="none" id="customer-to-store-1" style="stroke:#555555;stroke-width:1.0;"/><polygon fill="#555555" points="382.22,263.4986,374.2799,257.6716,377.335,262.4325,372.5741,265.4876,382.22,263.4986" style="stroke:#555555;stroke-width:1.0;"/><text fill="#333333" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="84" x="245" y="218.2925">Browse, order,</text><text fill="#333333" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="76" x="249" y="233.2412">track delivery</text></g><!--link store to payment--><!--link store to payment--><g id="link_store_payment"><path d="M445.5,317.2086 C445.5,337.9186 445.5,356.8686 445.5,376.3986 " fill="none" id="store-to-payment-1" style="stroke:#555555;stroke-width:1.0;"/><polygon fill="#555555" points="445.5,382.3986,449.5,373.3986,445.5,377.3986,441.5,373.3986,445.5,382.3986" style="stroke:#555555;stroke-width:1.0;"/><text fill="#333333" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="102" x="376" y="347.5425">Request payment</text><text fill="#333333" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="128" x="363" y="362.4912">authorisation or refund</text></g><!--link purpose to store--><!--link support to store--><g id="link_support_store"><path d="M445.5,171.7786 C445.5,191.2486 445.5,210.1286 445.5,230.8086 " fill="none" id="support-to-store" style="stroke:#555555;stroke-width:1.0;"/><polygon fill="#555555" points="445.5,236.8086,449.5,227.8086,445.5,231.8086,441.5,227.8086,445.5,236.8086" style="stroke:#555555;stroke-width:1.0;"/><text fill="#333333" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="90" x="382" y="202.0425">Manage returns</text><text fill="#333333" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="88" x="383" y="216.9912">and exceptions</text></g><!--link store to delivery--><g id="link_store_delivery"><path d="M508.67,290.0686 C566.24,302.0786 643,318.0986 643,318.0986 C643,318.0986 673,332.0986 673,332.0986 C673,332.0986 689.3103,338.5425 714.8803,348.6525 " fill="none" id="store-to-delivery" style="stroke:#555555;stroke-width:1.0;"/><polygon fill="#555555" points="720.46,350.8586,713.5612,343.8296,715.8103,349.0202,710.6197,351.2692,720.46,350.8586" style="stroke:#555555;stroke-width:1.0;"/><text fill="#333333" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="77" x="563.5" y="283.2925">Send delivery</text><text fill="#333333" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="43" x="580.5" y="298.2412">request</text></g><!--reverse link store to delivery--><g id="link_store_delivery"><path d="M509.0076,320.7663 C537.5176,340.6963 561,357.0986 561,357.0986 C561,357.0986 650.99,366.5286 720.41,373.8086 " fill="none" id="store-backto-delivery" style="stroke:#555555;stroke-width:1.0;"/><polygon fill="#555555" points="504.09,317.3286,509.1746,325.7635,508.188,320.1933,513.7581,319.2067,504.09,317.3286" style="stroke:#555555;stroke-width:1.0;"/><text fill="#333333" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="80" x="562" y="339.2925">Send tracking</text><text fill="#333333" font-family="Arial" font-size="13" lengthAdjust