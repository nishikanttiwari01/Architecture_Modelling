<?xml version="1.0" encoding="us-ascii" standalone="no"?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="853px" preserveAspectRatio="none" style="width:474px;height:853px;background:#FFFFFF;" version="1.1" viewBox="0 0 474 853" width="474px" zoomAndPan="magnify"><defs/><g><text fill="#000000" font-family="Arial" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="417" x="21.5" y="23.1318">Horizon Bank customer-acquisition value stream cross-map</text><!--entity CUSTOMER--><g id="elem_CUSTOMER"><rect fill="#E0F2FE" height="61.3965" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="232" x="120.5" y="44.0986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="89" x="130.5" y="65.3545">STAKEHOLDER</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="90" x="130.5" y="79.1533">Retail Customer</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="212" x="130.5" y="92.9521">Need: establish a banking relationship</text></g><!--entity S1--><g id="elem_S1"><rect fill="#F8FAFC" height="88.9941" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="367" x="53" y="135.0986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="151" x="63" y="156.3545">STAGE 1  Need understood</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="212" x="63" y="170.1533">Value added: suitable direction is clear</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="193" x="63" y="183.9521">Primary: Relationship Management</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="154" x="63" y="197.751">Supporting: Digital Servicing</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="347" x="63" y="211.5498">BIAN 14.0: assess candidate Service Domains and interactions</text></g><!--entity S2--><g id="elem_S2"><rect fill="#F8FAFC" height="88.9941" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="367" x="53" y="254.0986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="183" x="63" y="275.3545">STAGE 2  Application established</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="252" x="63" y="289.1533">Value added: intent and evidence can proceed</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="152" x="63" y="302.9521">Primary: Document Capture</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="154" x="63" y="316.751">Supporting: Digital Servicing</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="347" x="63" y="330.5498">BIAN 14.0: assess candidate Service Domains and interactions</text></g><!--entity S3--><g id="elem_S3"><rect fill="#FEF3C7" height="88.9941" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="367" x="53" y="373.0986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="225" x="63" y="394.3545">STAGE 3  Identity and eligibility confirmed</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="248" x="63" y="408.1533">Value added: governed decision is supported</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="256" x="63" y="421.9521">Primary: Identity Verification | Risk Assessment</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="212" x="63" y="435.751">Supporting: Financial Crime Screening</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="347" x="63" y="449.5498">BIAN 14.0: assess candidate Service Domains and interactions</text></g><!--entity S4--><g id="elem_S4"><rect fill="#F8FAFC" height="88.9941" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="367" x="53" y="492.0986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="236" x="63" y="513.3545">STAGE 4  Banking relationship established</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="282" x="63" y="527.1533">Value added: authoritative relationship records exist</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="252" x="63" y="540.9521">Primary: Party Management | Account Opening</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="207" x="63" y="554.751">Supporting: none in this selected view</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="347" x="63" y="568.5498">BIAN 14.0: assess candidate Service Domains and interactions</text></g><!--entity S5--><g id="elem_S5"><rect fill="#F8FAFC" height="88.9941" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="367" x="53" y="611.0986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="172" x="63" y="632.3545">STAGE 5  Services ready to use</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="227" x="63" y="646.1533">Value added: agreed service can be used</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="136" x="63" y="659.9521">Primary: Digital Servicing</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="307" x="63" y="673.751">Supporting: Notification Management | Account Servicing</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="347" x="63" y="687.5498">BIAN 14.0: assess candidate Service Domains and interactions</text></g><!--entity OUTCOME--><g id="elem_OUTCOME"><rect fill="#DCFCE7" height="47.5977" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="175" x="149" y="730.0986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="60" x="159" y="751.3545">OUTCOME</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="155" x="159" y="765.1533">Usable banking relationship</text></g><g id="elem_GMN15"><path d="M6,795.0986 L6,846.4951 A0,0 0 0 0 6,846.4951 L467,846.4951 A0,0 0 0 0 467,846.4951 L467,805.0986 L457,795.0986 L240.5,795.0986 L236.5,778.3886 L232.5,795.0986 L6,795.0986 A0,0 0 0 0 6,795.0986 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M457,795.0986 L457,805.0986 L467,805.0986 L457,795.0986 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="353" x="12" y="811.3545">Capability contributions enable stages; they do not equal stages.</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="312" x="12" y="825.1533">BIAN mappings are candidate, partial and many-to-many.</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="440" x="12" y="838.9521">A Service Domain is not a value stage, process step, application or microservice.</text></g><!--link CUSTOMER to S1--><g id="link_CUSTOMER_S1"><path d="M236.5,105.1186 C236.5,114.3886 236.5,118.8286 236.5,128.8686 " fill="none" id="CUSTOMER-to-S1" style="stroke:#334155;stroke-width:1.0;"/><polygon fill="#334155" points="236.5,134.8686,240.5,125.8686,236.5,129.8686,232.5,125.8686,236.5,134.8686" style="stroke:#334155;stroke-width:1.0;"/><text fill="#1E293B" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="98" x="237.5" y="124.4165">seeks value through</text></g><!--link S1 to S2--><g id="link_S1_S2"><path d="M236.5,224.1686 C236.5,233.9086 236.5,238.2486 236.5,247.9986 " fill="none" id="S1-to-S2" style="stroke:#334155;stroke-width:1.0;"/><polygon fill="#334155" points="236.5,253.9986,240.5,244.9986,236.5,248.9986,232.5,244.9986,236.5,253.9986" style="stroke:#334155;stroke-width:1.0;"/><text fill="#1E293B" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="66" x="237.5" y="243.4165">contributes to</text></g><!--link S2 to S3--><g id="link_S2_S3"><path d="M236.5,343.1686 C236.5,352.9086 236.5,357.2486 236.5,366.9986 " fill="none" id="S2-to-S3" style="stroke:#334155;stroke-width:1.0;"/><polygon fill="#334155" points="236.5,372.9986,240.5,363.9986,236.5,367.9986,232.5,363.9986,236.5,372.9986" style="stroke:#334155;stroke-width:1.0;"/><text fill="#1E293B" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="66" x="237.5" y="362.4165">contributes to</text></g><!--link S3 to S4--><g id="link_S3_S4"><path d="M236.5,462.1686 C236.5,471.9086 236.5,476.2486 236.5,485.9986 " fill="none" id="S3-to-S4" style="stroke:#334155;stroke-width:1.0;"/><polygon fill="#334155" points="236.5,491.9986,240.5,482.9986,236.5,486.9986,232.5,482.9986,236.5,491.9986" style="stroke:#334155;stroke-width:1.0;"/><text fill="#1E293B" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="66" x="237.5" y="481.4165">contributes to</text></g><!--link S4 to S5--><g id="link_S4_S5"><path d="M236.5,581.1686 C236.5,590.9086 236.5,595.2486 236.5,604.9986 " fill="none" id="S4-to-S5" style="stroke:#334155;stroke-width:1.0;"/><polygon fill="#334155" points="236.5,610.9986,240.5,601.9986,236.5,605.9986,232.5,601.9986,236.5,610.9986" style="stroke:#334155;stroke-width:1.0;"/><text fill="#1E293B" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="66" x="237.5" y="600.4165">contributes to</text></g><!--link S5 to OUTCOME--><g id="link_S5_OUTCOME"><path d="M236.5,700.3286 C236.5,710.6086 236