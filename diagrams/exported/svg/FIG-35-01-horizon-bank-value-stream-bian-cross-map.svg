<?xml version="1.0" encoding="us-ascii" standalone="no"?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="814px" preserveAspectRatio="none" style="width:690px;height:814px;background:#FFFFFF;" version="1.1" viewBox="0 0 690 814" width="690px" zoomAndPan="magnify"><defs/><g><text fill="#000000" font-family="Arial" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="417" x="129.75" y="23.1318">Horizon Bank customer-acquisition value stream cross-map</text><!--entity CUSTOMER--><g id="elem_CUSTOMER"><rect fill="#E0F2FE" height="75.1953" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="232" x="45.5" y="44.0986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="89" x="55.5" y="65.3545">STAKEHOLDER</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="90" x="55.5" y="79.1533">Retail Customer</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="212" x="55.5" y="92.9521">Need: establish a banking relationship</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="191" x="55.5" y="106.751">[seeks value through value stream]</text></g><!--entity STREAM--><g id="elem_STREAM"><rect fill="#DBEAFE" height="61.3965" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="184" x="69.5" y="137.0986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="89" x="79.5" y="158.3545">VALUE STREAM</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="164" x="79.5" y="172.1533">Acquire customer relationship</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="159" x="79.5" y="185.9521">[comprises five value stages]</text></g><!--entity SH--><g id="elem_SH"><rect fill="#E0F2FE" height="61.3965" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="163" x="80" y="216.0986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="117" x="90" y="237.3545">VALUE-STAGE BAND</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="126" x="90" y="251.1533">Each stage contributes</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="143" x="90" y="264.9521">independently to Outcome</text></g><!--entity CH--><g id="elem_CH"><rect fill="#E0E7FF" height="61.3965" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="165" x="262" y="216.0986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="145" x="272" y="237.3545">LOCAL-CAPABILITY BAND</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="107" x="272" y="251.1533">Capabilities enable</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="95" x="272" y="264.9521">the aligned stage</text></g><!--entity BH--><g id="elem_BH"><rect fill="#F1F5F9" height="61.3965" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="181" x="456" y="216.0986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="142" x="466" y="237.3545">BIAN-REFERENCE BAND</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="148" x="466" y="251.1533">BIAN informs responsibility</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="161" x="466" y="264.9521">analysis for the aligned stage</text></g><!--entity S1--><g id="elem_S1"><rect fill="#F8FAFC" height="61.3965" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="158" x="71.5" y="295.0986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="109" x="81.5" y="316.3545">1  Need understood</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="138" x="81.5" y="330.1533">Suitable direction is clear</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="133" x="81.5" y="343.9521">[contributes to Outcome]</text></g><!--entity S2--><g id="elem_S2"><rect fill="#F8FAFC" height="61.3965" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="197" x="52" y="374.0986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="141" x="62" y="395.3545">2  Application established</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="177" x="62" y="409.1533">Intent and evidence can proceed</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="133" x="62" y="422.9521">[contributes to Outcome]</text></g><!--entity S3--><g id="elem_S3"><rect fill="#FEF3C7" height="61.3965" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="203" x="17" y="453.0986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="183" x="27" y="474.3545">3  Identity and eligibility confirmed</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="175" x="27" y="488.1533">Governed decision is supported</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="133" x="27" y="501.9521">[contributes to Outcome]</text></g><!--entity S4--><g id="elem_S4"><rect fill="#F8FAFC" height="61.3965" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="227" x="7" y="532.0986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="194" x="17" y="553.3545">4  Banking relationship established</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="207" x="17" y="567.1533">Authoritative relationship records exist</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="133" x="17" y="580.9521">[contributes to Outcome]</text></g><!--entity S5--><g id="elem_S5"><rect fill="#F8FAFC" height="61.3965" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="172" x="48.5" y="611.0986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="130" x="58.5" y="632.3545">5  Services ready to use</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="152" x="58.5" y="646.1533">Agreed service can be used</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="133" x="58.5" y="659.9521">[contributes to Outcome]</text></g><!--entity C1--><g id="elem_C1"><rect fill="#E0E7FF" height="47.5977" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="213" x="238" y="301.5986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="193" x="248" y="322.8545">Primary: Relationship Management</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="154" x="248" y="336.6533">Supporting: Digital Servicing</text></g><!--entity C2--><g id="elem_C2"><rect fill="#E0E7FF" height="47.5977" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="174" x="257.5" y="380.5986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="152" x="267.5" y="401.8545">Primary: Document Capture</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="154" x="267.5" y="415.6533">Supporting: Digital Servicing</text></g><!--entity C3--><g id="elem_C3"><rect fill="#E0E7FF" height="61.3965" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="232" x="228.5" y="453.0986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="149" x="238.5" y="474.3545">Primary: Identity Verification</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="122" x="238.5" y="488.1533">and Risk Assessment</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="212" x="238.5" y="501.9521">Supporting: Financial Crime Screening</text></g><!--entity C4--><g id="elem_C4"><rect fill="#E0E7FF" height="61.3965" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="204" x="242.5" y="532.0986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="150" x="252.5" y="553.3545">Primary: Party Management</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="117" x="252.5" y="567.1533">and Account Opening</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="184" x="252.5" y="580.9521">Supporting: none in selected view</text></g><!--entity C5--><g id="elem_C5"><rect fill="#E0E7FF" height="61.3965" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="222" x="228.5" y="611.0986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="136" x="238.5" y="632.3545">Primary: Digital Servicing</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="202" x="238.5" y="646.1533">Supporting: Notification Management</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="120" x="238.5" y="659.9521">and Account Servicing</text></g><!--entity B1--><g id="elem_B1"><rect fill="#F1F5F9" height="61.3965" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="216" x="459.5" y="295.0986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="148" x="469.5" y="316.3545">BIAN 14.0 logical reference</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="196" x="469.5" y="330.1533">Assess candidate Service Domains</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="88" x="469.5" y="343.9521">and interactions</text></g><!--entity B2--><g id="elem_B2"><rect fill="#F1F5F9" height="61.3965" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="216" x="459.5" y="374.0986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="148" x="469.5" y="395.3545">BIAN 14.0 logical reference</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="196" x="469.5" y="409.1533">Assess candidate Service Domains</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="88" x="469.5" y="422.9521">and interactions</text></g><!--entity B3--><g id="elem_B3"><rect fill="#F1F5F9" height="61.3965" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="216" x="468.5" y="453.0986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="148" x="478.5" y="474.3545">BIAN 14.0 logical reference</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="196" x="478.5" y="488.1533">Assess candidate Service Domains</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="88" x="478.5" y="501.9521">and interactions</text></g><!--entity B4--><g id="elem_B4"><rect fill="#F1F5F9" height="61.3965" rx="4" ry="4" style="stroke:#334155;stroke-width:0.5;" width="216" x="458.5" y="532.0986"/><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="148" x="468.5" y="553.3545">BIAN 14.0 logical reference</text><text fill="#0F172A" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="196" x="468.5" y="567.1533">Assess candidate Service Domains</text><text fill="#0F172A" font-family="Arial" font-size="1