  <text x="470.0" y="152.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1D2939">establishes party and customer records</text>
  <path d="M460.0 214.8 L510.0 223.2" fill="none" stroke="#475467" stroke-width="1.2"/>
  <polygon points="510.0,223.2 500.4,226.0 501.8,217.4" fill="#475467"/>
  <rect x="607.0" y="173.5" width="186.0" height="17.0" rx="3" ry="3" fill="#FFFFFF" stroke="#B0B7C3" stroke-width="0.8"/>
