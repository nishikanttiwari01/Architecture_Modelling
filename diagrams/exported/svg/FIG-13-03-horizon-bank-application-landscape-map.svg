<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="830" viewBox="0 0 1200 830" role="img" aria-labelledby="ttl dsc">
  <title id="ttl">FIG-13-03. Horizon Bank Application Landscape Map</title>
  <desc id="dsc">FIG-13-03. Horizon Bank Application Landscape Map</desc>
  <rect x="0" y="0" width="1200" height="830" fill="#FFFFFF"/>
  <text x="600.0" y="32.6" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#111827">FIG-13-03. Horizon Bank Application Landscape Map</text>
  <text x="600.0" y="58.2" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-style="italic" fill="#111827">Deliberately mixed current and target estate. Every system carries one lifecycle marker.</text>
  <rect x="30.0" y="300.0" width="190.0" height="58.0" rx="8" ry="8" fill="#EAF2FB" stroke="#175CD3" stroke-width="1"/>
  <text x="125.0" y="325.7" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#111827">Horizon Digital Channels</text>
  <text x="125.0" y="340.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#111827">[Target]</text>
  <rect x="270.0" y="170.0" width="190.0" height="58.0" rx="8" ry="8" fill="#EAF2FB" stroke="#175CD3" stroke-width="1"/>
  <text x="365.0" y="195.7" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#111827">Customer Onboarding Platform</text>
  <text x="365.0" y="210.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#111827">[Target]</text>
  <rect x="270.0" y="430.0" width="190.0" height="58.0" rx="8" ry="8" fill="#EAF2FB" stroke="#175CD3" stroke-width="1"/>
  <text x="365.0" y="455.7" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#111827">Payments Platform</text>
  <text x="365.0" y="470.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#111827">[Target]</text>
  <rect x="510.0" y="90.0" width="190.0" height="58.0" rx="8" ry="8" fill="#EAF2FB" stroke="#175CD3" stroke-width="1"/>
  <text x="605.0" y="115.7" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#111827">Party and Customer Platform</text>
  <text x="605.0" y="130.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#111827">[Target]</text>
  <rect x="510.0" y="210.0" width="190.0" height="58.0" rx="8" ry="8" fill="#EAF2FB" stroke="#175CD3" stroke-width="1"/>
  <text x="605.0" y="235.7" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#111827">Product Catalogue</text>
  <text x="605.0" y="250.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#111827">[Target]</text>
  <rect x="510.0" y="330.0" width="190.0" height="58.0" rx="8" ry="8" fill="#FFF3E0" stroke="#B54708" stroke-width="1.5"/>
  <text x="605.0" y="355.7" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#111827">Financial Crime Platform</text>
  <text x="605.0" y="370.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#111827">[Mixed]</text>
  <rect x="750.0" y="330.0" width="190.0" height="58.0" rx="8" ry="8" fill="#F3EEFB" stroke="#6941C6" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="845.0" y="355.7" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#111827">Enterprise Integration Platform</text>
  <text x="845.0" y="370.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#111827">[Transitional]</text>
  <rect x="750.0" y="470.0" width="190.0" height="58.0" rx="8" ry="8" fill="#EAF2FB" stroke="#175CD3" stroke-width="1"/>
  <text x="845.0" y="495.7" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#111827">Event Platform</text>
  <text x="845.0" y="510.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#111827">[Target]</text>
  <rect x="990.0" y="430.0" width="190.0" height="58.0" rx="8" ry="8" fill="#ECECEC" stroke="#111111" stroke-width="3"/>
  <text x="1085.0" y="455.7" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#111827">Core Deposit System</text>
  <text x="1085.0" y="470.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#111827">[Legacy retained initially]</text>
  <rect x="990.0" y="560.0" width="190.0" height="58.0" rx="8" ry="8" fill="#EAF2FB" stroke="#175CD3" stroke-width="1"/>
  <text x="1085.0" y="585.7" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#111827">Enterprise Data Platform</text>
  <text x="1085.0" y="600.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#111827">[Target]</text>
  <rect x="30.0" y="660.0" width="560.0" height="150.0" rx="8" ry="8" fill="#FFFFFF" stroke="#666666" stroke-width="1"/>
  <text x="36.0" y="677.0" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#111827">Lifecycle legend (marker text is the primary meaning; border style supports it):</text>
  <text x="36.0" y="691.3" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#111827">Target: solid blue border, light blue fill.</text>
  <text x="36.0" y="705.6" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#111827">Mixed: solid amber border, light amber fill.</text>
  <text x="36.0" y="719.9" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#111827">Transitional: dashed purple border, light purple fill.</text>
  <text x="36.0" y="734.2" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#111827">Legacy retained initially: thick black border, grey fill.</text>
  <rect x="610.0" y="660.0" width="570.0" height="150.0" rx="8" ry="8" fill="#FFF8DC" stroke="#8A6D3B" stroke-width="1"/>
  <text x="616.0" y="677.0" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#111827">Limitation: this is a mixed-state landscape. It does not imply that every target system exists fully today. Relationship</text>
  <text x="616.0" y="691.3" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#111827">labels are high level. Detailed interface mechanisms (APIs, events, files, adapters) belong in an integration view or</text>
  <text x="616.0" y="705.6" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#111827">interface catalogue, not in this landscape map.</text>
  <path d="M178.5 300.0 L311.5 228.0" fill="none" stroke="#475467" stroke-width="1.2"/>
