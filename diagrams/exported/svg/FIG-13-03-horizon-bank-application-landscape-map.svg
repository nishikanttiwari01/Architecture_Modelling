  <text x="625.0" y="432.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1D2939">invokes retained-core integration services</text>
  <path d="M914.6 388.0 L1015.4 430.0" fill="none" stroke="#475467" stroke-width="1.2"/>
