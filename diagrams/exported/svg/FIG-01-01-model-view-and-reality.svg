<?xml version="1.0" encoding="us-ascii" standalone="no"?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="511px" preserveAspectRatio="none" style="width:847px;height:511px;background:#FFFFFF;" version="1.1" viewBox="0 0 847 511" width="847px" zoomAndPan="magnify"><defs/><g><text fill="#000000" font-family="Arial" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="236" x="298.5" y="23.1318">FIG-01-01. Model, view and reality</text><!--entity reality--><g id="elem_reality"><rect fill="#F2F7F5" height="100.4932" rx="4" ry="4" style="stroke:#2F5E4E;stroke-width:0.5;" width="163" x="124" y="44.0986"/><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="86" x="134" y="67.2305">Real situation</text><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="4" x="134" y="83.3291">&#160;</text><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="143" x="134" y="99.4277">People, systems, data,</text><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="142" x="134" y="115.5264">processes, constraints</text><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="62" x="134" y="131.625">and goals</text></g><!--entity model--><g id="elem_model"><rect fill="#F2F7F5" height="100.4932" rx="4" ry="4" style="stroke:#2F5E4E;stroke-width:0.5;" width="196" x="107.5" y="195.0986"/><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="118" x="117.5" y="218.2305">Architecture model</text><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="4" x="117.5" y="234.3291">&#160;</text><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="164" x="117.5" y="250.4277">A purposeful simplification</text><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="176" x="117.5" y="266.5264">that keeps the facts needed</text><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="85" x="117.5" y="282.625">for a decision</text></g><!--entity business--><g id="elem_business"><rect fill="#F2F7F5" height="84.3945" rx="4" ry="4" style="stroke:#2F5E4E;stroke-width:0.5;" width="139" x="136" y="421.0986"/><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="88" x="146" y="444.2305">Business view</text><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="4" x="146" y="460.3291">&#160;</text><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="119" x="146" y="476.4277">What outcome and</text><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="103" x="146" y="492.5264">who is involved?</text></g><!--entity software--><g id="elem_software"><rect fill="#F2F7F5" height="84.3945" rx="4" ry="4" style="stroke:#2F5E4E;stroke-width:0.5;" width="136" x="435" y="318.0986"/><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="86" x="445" y="341.2305">Software view</text><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="4" x="445" y="357.3291">&#160;</text><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="116" x="445" y="373.4277">What systems and</text><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="114" x="445" y="389.5264">interfaces matter?</text></g><!--entity deployment--><g id="elem_deployment"><rect fill="#F2F7F5" height="84.3945" rx="4" ry="4" style="stroke:#2F5E4E;stroke-width:0.5;" width="133" x="688" y="203.0986"/><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="106" x="698" y="226.2305">Deployment view</text><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="4" x="698" y="242.3291">&#160;</text><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="113" x="698" y="258.4277">Where does it run</text><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="85" x="698" y="274.5264">and operate?</text></g><!--entity decision--><g id="elem_decision"><rect fill="#F2F7F5" height="84.3945" rx="4" ry="4" style="stroke:#2F5E4E;stroke-width:0.5;" width="173" x="668" y="338.0986"/><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="113" x="678" y="361.2305">Decision or action</text><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="4" x="678" y="377.3291">&#160;</text><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="153" x="678" y="393.4277">Choose, explain, review,</text><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="112" x="678" y="409.5264">change or govern</text></g><g id="elem_GMN18"><path d="M102,330.5986 L102,385.4448 A0,0 0 0 0 102,385.4448 L309,385.4448 A0,0 0 0 0 309,385.4448 L309,340.5986 L299,330.5986 L209.5,330.5986 L205.5,295.3486 L201.5,330.5986 L102,330.5986 A0,0 0 0 0 102,330.5986 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M299,330.5986 L299,340.5986 L309,340.5986 L299,330.5986 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="186" x="108" y="347.7925">A model is not the whole reality.</text><text fill="#000000" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="163" x="108" y="362.7412">It is useful because it leaves</text><text fill="#000000" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="112" x="108" y="377.6899">irrelevant detail out.</text></g><!--link reality to model--><g id="link_reality_model"><path d="M205.5,144.1586 C205.5,160.4486 205.5,172.5186 205.5,188.8186 " fill="none" id="reality-to-model" style="stroke:#555555;stroke-width:1.0;"/><polygon fill="#555555" points="205.5,194.8186,209.5,185.8186,205.5,189.8186,201.5,185.8186,205.5,194.8186" style="stroke:#555555;stroke-width:1.0;"/><text fill="#333333" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="115" x="137" y="174.7925">select relevant facts</text></g><!--link model to business--><g id="link_model_business"><path d="M107.29,272.9686 C55.95,293.0886 8.43,324.0986 33,366.0986 C55.2,404.0586 92.7455,426.1147 130.3155,440.8747 " fill="none" id="model-to-business" style="stroke:#555555;stroke-width:1.0;"/><polygon fill="#555555" points="135.9,443.0686,128.9859,436.0547,131.2463,441.2403,126.0606,443.5007,135.9,443.0686" style="stroke:#555555;stroke-width:1.0;"/><text fill="#333333" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="64" x="7" y="363.2925">create view</text></g><!--link model to software--><g id="link_model_software"><path d="M303.67,282.9086 C346.56,299.6086 390.3385,316.6426 429.0885,331.7226 " fill="none" id="model-to-software" style="stroke:#555555;stroke-width:1.0;"/><polygon fill="#555555" points="434.68,333.8986,427.7434,326.907,430.0204,332.0853,424.8421,334.3623,434.68,333.8986" style="stroke:#555555;stroke-width:1.0;"/><text fill="#333333" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="64" x="340" y="296.2925">create view</text></g><!--link model to deployment--><g id="link_model_deployment"><path d="M303.66,245.0986 C414.34,245.0986 586.17,245.0986 681.72,245.0986 " fill="none" id="model-to-deployment" style="stroke:#555555;stroke-width:1.0;"/><polygon fill="#555555" points="687.72,245.0986,678.72,241.0986,682.72,245.0986,678.72,249.0986,687.72,245.0986" style="stroke:#555555;stroke-width:1.0;"/><text fill="#333333" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="64" x="471" y="242.2925">create view</text></g><!--link business to decision--><g id="link_business_decision"><path d="M275.28,462.5686 C349,460.9486 469.19,455.2386 571,436.0986 C603.08,430.0686 631.7838,422.212 661.9738,412.582 " fill="none" id="business-to-decision" style="stroke:#555555;stroke-width:1.0;"/><polygon fill="#555555" points="667.69,410.7586,657.9001,409.6829,662.9265,412.2781,660.3312,417.3045,667.69,410.7586" style="stroke:#555555;stroke-width:1.0;"/><text fill="#333333" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="35" x="485.5" y="433.2925">inform</text></g><!--link software to decision--><g id="link_software_decision"><path d="M571.19,365.4886 C600.92,367.8686 630.2591,370.2198 661.8591,372.7498 " fill="none" id="software-to-decision" style="stroke:#555555;stroke-width:1.0;"/><polygon fill="#555555" points="667.84,373.2286,659.1879,368.5231,662.8559,372.8296,658.5495,376.4976,667.84,373.2286" style="stroke:#555555;stroke-width:1.0;"/><text fill="#333333" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="35" x="602" y="365.2925">inform</text></g><!--link deployment to decision--><g id="link_deployment_decision"><path d="M754.5,287.2886 C754.5,303.3586 754.5,315.6686 754.5,331.7586 " fill="none" id="deployment-to-decision" style="stroke:#555555;stroke-width:1.0;"/><polygon fill="#555555" points="754.5,337.7586,758.5,328.7586,754.5,332.7586,750.5,328.7586,754.5,337.7586" style="stroke:#555555;stroke-width:1.0;"/><text fill="#333333" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="35" x="726" y="317.7925">inform</text></g><!--link business to software--><!--link software to deployment--><!--link decision to reality--><g id="link_decision_reality"><path d="M705.26,337.8786 C651.84,291.1486 572.92,222.2086 571,221.0986 C480.01,168.2786 369.3387,133.9817 292.8587,114.1917 " fill="none" id="decision-to-reality" style="st