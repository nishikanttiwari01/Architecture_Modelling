spacing" textLength="157" x="284" y="115.5264">What runs or stores data</text><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="117" x="284" y="131.625">inside the system?</text></g><!--entity component--><g id="elem_component"><rect fill="#E8F1FA" height="100.4932" rx="4" ry="4" style="stroke:#2F5D7C;stroke-width:0.5;" width="187" x="559" y="44.0986"/><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="73" x="569" y="67.2305">Component</text><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="4" x="569" y="83.3291">&#160;</text><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="61" x="569" y="99.4277">Question:</text><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="167" x="569" y="115.5264">What major parts sit inside</text><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="79" x="569" y="131.625">a container?</text></g><!--entity code--><g id="elem_code"><rect fill="#E8F1FA" height="100.4932" rx="4" ry="4" style="stroke:#2F5D7C;stroke-width:0.5;" width="190" x="869" y="44.0986"/><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="34" x="879" y="67.2305">Code</text><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="4" x="879" y="83.3291">&#160;</text><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="61" x="879" y="99.4277">Question:</text><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="170" x="879" y="115.5264">What classes or code units</text><text fill="#111111" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="141" x="879" y="131.625">matter for this design?</text></g><g id="elem_GMN9"><path d="M854,179.0986 L854,218.9961 A0,0 0 0 0 854,218.9961 