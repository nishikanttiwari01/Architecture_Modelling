  <text x="470.0" y="32.6" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#111827">FIG-13-06. Horizon Bank Payment Modernisation Wardley Map</text>
  <text x="470.0" y="58.2" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-style="italic" fill="#111827">Strategy discussion map. Component positions are assumptions for discussion.</text>
  <text x="470.0" y="79.2" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-style="italic" fill="#111827">Vertical: visibility to user (high at top, low at bottom). Horizontal: evolution (left to right).</text>
  <rect x="60.0" y="95.0" width="1.0" height="695.0" rx="0" ry="0" fill="#FFFFFF" stroke="#D0D5DD" stroke-width="1"/>
