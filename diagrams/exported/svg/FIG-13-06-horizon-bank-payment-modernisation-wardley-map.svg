  <rect x="85.0" y="160.0" width="150.0" height="50.0" rx="8" ry="8" fill="#FFF3E0" stroke="#B54708" stroke-width="1"/>
  <text x="160.0" y="175.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#111827">User need:</text>
