  <text x="560.0" y="390.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#111827">(conf: Medium)</text>
  <rect x="500.0" y="445.0" width="150.0" height="50.0" rx="8" ry="8" fill="#EAF2FB" stroke="#175CD3" stroke-width="1"/>
  <text x="575.0" y="460.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#111827">Financial crime screening</text>
  <text x="575.0" y="473.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#111827">service</text>
  <text x="575.0" y="486.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#111827">(conf: Medium)</text>
  <rect x="285.0" y="480.0" width="150.0" height="50.0" rx="8" ry="8" fill="#EAF2FB" stroke="#175CD3" stroke-width="1"/>
  <text x="360.0" y="495.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#111827">Customer and account data</text>
  <text x="360.0" y="508.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#111827">access</text>
  <text x="360.0" y="521.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#111827">(conf: Medium)</text>
  <rect x="485.0" y="575.0" width="150.0" height="50.0" rx="8" ry="8" fill="#EAF2FB" stroke="#175CD3" stroke-width="1"/>
