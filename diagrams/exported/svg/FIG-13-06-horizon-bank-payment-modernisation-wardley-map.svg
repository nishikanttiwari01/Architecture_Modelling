  <text x="560.0" y="811.9" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#111827">Product or rental</text>
  <text x="760.0" y="811.9" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#111827">Commodity or utility</text>
  <text x="460.0" y="837.9" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-style="italic" fill="#111827">Evolution  →</text>
  <text x="76.0" y="313.5" text-anchor="start" font-family="Arial, sans-serif" font-size="10" font-style="italic" fill="#111827">Visibility to user:</text>
  <text x="76.0" y="335.5" text-anchor="start" font-family="Arial, sans-serif" font-size="10" font-style="italic" fill="#111827">high at top ↑</text>
  <text x="76.0" y="753.5" text-anchor="start" font-family="Arial, sans-serif" font-size="10" font-style="italic" fill="#111827">low at bottom ↓</text>
