  <text x="760.0" y="627.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#111827">Compute service</text>
  <text x="760.0" y="640.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#111827">(conf: High)</text>
  <rect x="685.0" y="665.0" width="150.0" height="50.0" rx="8" ry="8" fill="#ECECEC" stroke="#333333" stroke-width="1"/>
  <text x="760.0" y="687.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#111827">Storage service</text>
  <text x="760.0" y="700.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#111827">(conf: High)</text>
  <rect x="685.0" y="725.0" width="150.0" height="50.0" rx="8" ry="8" fill="#ECECEC" stroke="#333333" stroke-width="1"/>
  <text x="760.0" y="747.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#111827">Network service</text>
  <text x="760.0" y="760.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#111827">(conf: High)</text>
  <rect x="60.0" y="850.0" width="800.0" height="90.0" rx="8" ry="8" fill="#FFF8DC" stroke="#8A6D3B" stroke-width="1"/>
  <text x="66.0" y="867.0" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#111827">Note: This is a strategy discussion map, not an application inventory or architecture roadmap. Vertical position shows visibility in the value chain; horizontal position</text>
  <text x="66.0" y="881.3" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#111827">shows assumed evolution. Lines are value-chain dependencies, not API direction, event flow, process sequence, data movement or implementation timing. To</text>
  <text x="66.0" y="895.6" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#111827">keep the map readable, only primary dependencies are drawn; the screening, fraud, data-access and event components all also rely on the platform utilities</text>
  <text x="66.0" y="909.9" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#111827">(compute, storage, network). Component positions are assumptions for discussion and should be challenged. They are illustrative, not factual assessments of a</text>
  <text x="66.0" y="924.2" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#111827">real bank.</text>
