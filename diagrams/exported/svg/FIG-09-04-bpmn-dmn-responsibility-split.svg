reening result,</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="82" x="257" y="315.625">cut-off status</text></g><!--entity Logic--><g id="elem_Logic"><rect fill="#EAF6E8" height="52.1973" rx="2.5" ry="2.5" style="stroke:#333333;stroke-width:0.5;" width="168" x="230" y="418.0986"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="148" x="240" y="441.2305">Payment Routing Rules</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="103" x="240" y="457.3291">&#171;Decision logic&#187;</text></g><!--entity Decision--><g id="elem_Decision"><rect fill="#DDEEFF" height="52.1973" rx="2.5" ry="2.5" style="stroke:#333333;stroke-width:0.5;" width="186" x="477" y="252.0986"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="166" x="487" y="275.2305">Determine Payment Route</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="70" x="487" y="291.3291">&#171;Decision&#187;</text></g><!--link Capture to RuleTask--><g id="link_Capture_RuleTask"><path d="M151.08,112.0986 C172.76,112.0986 191.38,112.0986 214.81,112.0986 " fill="none" id="Capture-to-RuleTask" style="stroke:#333333;stroke-width:1.2;"/><polygon fill="#333333" points="220.81,112.0986,211.81,108.0986,215.81,112.0986,211.81,116.0986,220.81,112.0986" style="stroke:#333333;stroke-width:1.2;"/></g><!--link RuleTask to Decision--><g id="link_RuleTask_Decision"><path d="M404,138.2986 C404,181.3886 404,262.4986 404,262.4986 C404,262.4986 432.97,262.4986 470.81,262.4986 " fill="none" id="RuleTask-to-Decision" style="stroke:#333333;stroke-width:1.2;"/><polygon fill="#333333" points="476.81,262.4986,467.81,258.4986,471.81,262.4986,467.81,266.4986,476.81,262.4986" style="stroke:#333333;stroke-width:1.2;"/></g><!--link Decision to RuleTask--><g id="link_Decision_RuleTask"><path d="M476.6,272.8986 C437.52,272.8986 401,272