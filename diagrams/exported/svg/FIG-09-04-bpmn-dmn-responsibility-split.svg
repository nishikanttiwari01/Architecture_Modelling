<?xml version="1.0" encoding="us-ascii" standalone="no"?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="635px" preserveAspectRatio="none" style="width:792px;height:635px;background:#FFFFFF;" version="1.1" viewBox="0 0 792 635" width="792px" zoomAndPan="magnify"><defs/><g><text fill="#000000" font-family="Arial" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="321" x="228.5" y="23.1318">FIG-09-04. BPMN and DMN Responsibility Split</text><!--cluster BPMN--><g id="cluster_BPMN"><path d="M8.5,420.0986 L211.5,420.0986 A3.75,3.75 0 0 1 214,422.5986 L221,442.1973 L742,442.1973 A2.5,2.5 0 0 1 744.5,444.6973 L744.5,536.5986 A2.5,2.5 0 0 1 742,539.0986 L8.5,539.0986 A2.5,2.5 0 0 1 6,536.5986 L6,422.5986 A2.5,2.5 0 0 1 8.5,420.0986 " fill="#F7F9FB" style="stroke:#000000;stroke-width:1.5;"/><line style="stroke:#000000;stroke-width:1.5;" x1="6" x2="221" y1="442.1973" y2="442.1973"/><text fill="#000000" font-family="Arial" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="202" x="10" y="435.2305">BPMN process responsibility</text></g><!--cluster DMN--><g id="cluster_DMN"><path d="M217.5,43.0986 L414.5,43.0986 A3.75,3.75 0 0 1 417,45.5986 L424,65.1973 L782.5,65.1973 A2.5,2.5 0 0 1 785,67.6973 L785,333.5986 A2.5,2.5 0 0 1 782.5,336.0986 L217.5,336.0986 A2.5,2.5 0 0 1 215,333.5986 L215,45.5986 A2.5,2.5 0 0 1 217.5,43.0986 " fill="#F2F5F7" style="stroke:#000000;stroke-width:1.5;"/><line style="stroke:#000000;stroke-width:1.5;" x1="215" x2="424" y1="65.1973" y2="65.1973"/><text fill="#000000" font-family="Arial" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="196" x="219" y="58.2305">DMN decision responsibility</text></g><!--entity Capture--><g id="elem_Capture"><rect fill="#FFFFFF" height="68.2959" rx="2.5" ry="2.5" style="stroke:#333333;stroke-width:0.5;" width="129" x="22" y="455.0986"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="109" x="32" y="478.2305">Capture payment</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="65" x="32" y="494.3291">instruction</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="97" x="32" y="510.4277">&#171;Process task&#187;</text></g><!--entity RuleTask--><g id="elem_RuleTask"><rect fill="#EAF6E8" height="52.1973" rx="2.5" ry="2.5" style="stroke:#333333;stroke-width:0.5;" width="186" x="222" y="457.0986"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="166" x="232" y="480.2305">Determine Payment Route</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="141" x="232" y="496.3291">&#171;Business Rule Task&#187;</text></g><!--entity Gateway--><g id="elem_Gateway"><rect fill="#FFFFFF" height="52.1973" rx="2.5" ry="2.5" style="stroke:#333333;stroke-width:0.5;" width="105" x="623.5" y="471.0986"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="85" x="633.5" y="494.2305">Route result?</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="71" x="633.5" y="510.3291">&#171;Gateway&#187;</text></g><!--entity Inputs--><g id="elem_Inputs"><rect fill="#FFFFFF" height="100.4932" rx="2.5" ry="2.5" style="stroke:#333333;stroke-width:0.5;" width="134" x="248" y="78.0986"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="97" x="258" y="101.2305">Payment inputs</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="114" x="258" y="117.3291">amount, currency,</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="96" x="258" y="133.4277">account status,</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="105" x="258" y="149.5264">screening result,</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="82" x="258" y="165.625">cut-off status</text></g><!--entity Logic--><g id="elem_Logic"><rect fill="#EAF6E8" height="52.1973" rx="2.5" ry="2.5" style="stroke:#333333;stroke-width:0.5;" width="168" x="231" y="268.0986"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="148" x="241" y="291.2305">Payment Routing Rules</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="103" x="241" y="307.3291">&#171;Decision logic&#187;</text></g><!--entity Decision--><g id="elem_Decision"><rect fill="#DDEEFF" height="52.1973" rx="2.5" ry="2.5" style="stroke:#333333;stroke-width:0.5;" width="186" x="583" y="239.0986"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="166" x="593" y="262.2305">Determine Payment Route</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="70" x="593" y="278.3291">&#171;Decision&#187;</text></g><!--link Capture to RuleTask--><g id="link_Capture_RuleTask"><path d="M151.2,487.4086 C173.05,486.8286 191.9621,486.3258 215.6221,485.7058 " fill="none" id="Capture-to-RuleTask" style="stroke:#333333;stroke-width:1.2;"/><polygon fill="#333333" points="221.62,485.5486,212.5183,481.7858,216.6217,485.6796,212.7279,489.783,221.62,485.5486" style="stroke:#333333;stroke-width:1.2;"/></g><!--link RuleTask to Decision--><g id="link_RuleTask_Decision"><path d="M344.3,456.7086 C369.12,434.3786 406.8,402.3686 443,379.0986 C497.55,344.0286 558.9366,314.6417 606.8566,293.5917 " fill="none" id="RuleTask-to-Decision" style="stroke:#333333;stroke-width:1.2;"/><polygon fill="#333333" points="612.35,291.1786,602.5012,291.136,607.7722,293.1895,605.7187,298.4605,612.35,291.1786" style="stroke:#333333;stroke-width:1.2;"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="101" x="445" y="304.2305">invoke decision,</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="103" x="444" y="320.3291">platform-specific</text></g><!--reverse link RuleTask to Decision--><g id="link_RuleTask_Decision"><path d="M414.1253,478.4876 C459.1753,472.9576 506.53,461.4786 548,435.0986 C604.26,399.3086 644.45,329.1486 663.17,291.1086 " fill="none" id="RuleTask-backto-Decision" style="stroke:#333333;stroke-width:1.2;"/><polygon fill="#333333" points="408.17,479.2186,417.5903,482.0923,413.1328,478.6094,416.6156,474.1519,408.17,479.2186" style="stroke:#333333;stroke-width:1.2;"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="91" x="450" y="415.2305">payment route</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="35" x="478" y="431.3291">result</text></g><!--link Inputs to Decision--><g id="link_Inputs_Decision"><path d="M382.26,153.3886 C446.08,177.7386 536.5745,212.269 601.0745,236.889 " fill="none" id="Inputs-to-Decision" style="stroke:#333333;stroke-width:1.2;"/><polygon fill="#333333" points="606.68,239.0286,599.6982,232.0821,602.0087,237.2456,596.8453,239.5562,606.68,239.0286" style="stroke:#333333;stroke-width:1.2;"/></g><!--link Logic to Decision--><g id="link_Logic_Decision"><path d="M377.9,268.0286 C398.26,260.7086 421.25,253.7586 443,250.0986 C488.67,242.4086 534.0473,243.9607 576.8073,248.7507 " fill="none" id="Logic-to-Decision" style="stroke:#333333;stroke-width:1.2;"/><polygon fill="#333333" points="582.77,249.4186,574.2712,244.4416,577.8011,248.862,573.3806,252.3919,582.77,249.4186" style="stroke:#333333;stroke-width:1.2;"/></g><!--link RuleTask to Gateway--><g id="link_RuleTask_Gateway"><path d="M408.01,500.9486 C419.75,502.6586 431.63,504.1186 443,505.0986 C504.84,510.4186 570.2516,506.9478 617.3316,502.9378 " fill="none" id="RuleTask-to-Gateway" style="stroke:#333333;stroke-width:1.2;"/><polygon fill="#333333" points="623.31,502.4286,614.003,499.2069,618.328,502.853,614.6819,507.178,623.31,502.4286" style="stroke:#333333;stroke-width:1.2;"/></g><rect fill="none" height="58.2959" id="_legend" rx="7.5" ry="7.5" style="stroke:#000000;stroke-width:1.0;" width="596" x="91" y="557.0986"/><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="458" x="96" y="575.2305">BPMN shows process order, responsibility and branching after the result.</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="450" x="96" y="591.3291">DMN shows repeatable decision logic and returns a named route result.</text><text fill="#000000" font-family="Arial" font-size="14" lengthAdjust="spacing" textLength="586" x="96" y="607.4277">The technical binding from a BPMN Business Rule Task to a DMN decision is vendor-specific.</text><!--SRC=[VPHHRzem4CVV_IbkvPLGD6rZdQfEOo5LfQr2NHzvCSu5B1BRiiz5QDfttpa9ANHe22dnuVlv_l_pyKuRLSSIOJAvvc-WGutXsjNIK6pgZBROuCJngn0rLWHamUlDbg3K7XLfQmHfgX6AX_jiUfDDFqnWllpv2DAKaFFp2OEp9kYrhZKTu9VZXn1XfusJNZPWR8a17TnCJu9UcbqApgP2EAbsSeDmrMATjmf307-6lG8PkcD7nQouAURmMm2a0gNPS75NtwMZw16SF3HeQ6Mq2UHZAs1bRc-NFPPasDtTjRXZogXeF-Uy70bzemt2iYF2aus42JMFWUFCUegyy_aLcDPf2QF5j-BJulCviSrFic9DNnFdNXBkvQ5FxbT3DNzEZ4asbwXqO36NZCbRNzuN7ulPMr-ErRFnaSBAoCP6GsDGqNiqwZ3ca58f1e4anS21e3mY6xZfg-MGYfJPgkhtj8S-jCJBxfrwbZZ9cP0qvqSLjTrerKl_aTulc_QVDXnHFMGWZ_9yiUWCF7Ouo-w6veYXIrbfzuP_6JA_i4ilTeU3rooS1uKgwviiE0vMMebUTtQIAJe5Pw61caLtSZmVqbzHy9sIpkEJidXtVndII6wGvsnjYMmZsW48MxiFmvXONw8VlxaKxMokUSRKDhalApOHUDBxVav4Fd0yEfGar_MhwgutBSCZ-sS2IE2BWsLNya1vPYAXsXgjP0rhRSfqMkLjmmbjhV-EIlf_aN1seNM05nPf_U3nHF2wa_uN]--></g></svg>